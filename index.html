<html lang="ko"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<title>📊 배송 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&amp;display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d0f1a;--card:#131625;--card2:#0f1120;--border:#1e2240;
  --text:#e8eaf6;--sub:#5c6080;--sub2:#3a3f60;
  --accent:#6c63ff;--accent2:#8b83ff;--accent3:#b8b5ff;
  --green:#00d4aa;--green2:#00f5c4;
  --orange:#ff7043;--orange2:#ff9a6c;
  --red:#ff4757;--teal:#00bcd4;--teal2:#5eead4;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;height:-webkit-fill-available}

/* ── 로그인 ── */
.login-wrap{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.login-wrap.hide{display:none}
.login-logo{font-size:52px;margin-bottom:10px}
.login-title{font-size:26px;font-weight:900;color:#fff;margin-bottom:4px}
.login-sub{font-size:11px;color:var(--sub);margin-bottom:32px;letter-spacing:2px}
.login-card{width:100%;max-width:340px;background:var(--card);border-radius:20px;padding:26px;border:1px solid var(--border)}
.lf{margin-bottom:14px}
.lf label{display:block;font-size:10px;color:var(--sub);font-weight:700;letter-spacing:0.5px;margin-bottom:6px}
.lf input{width:100%;background:var(--card2);border:1.5px solid var(--border);border-radius:12px;padding:13px 16px;font-size:16px;color:var(--text);outline:none;font-family:inherit;-webkit-appearance:none;transition:border 0.2s}
.lf input:focus{border-color:var(--accent)}
.btn-login{width:100%;padding:15px;border:none;border-radius:14px;font-size:16px;font-weight:900;cursor:pointer;font-family:inherit;background:linear-gradient(135deg,var(--accent),#8b83ff);color:#fff;box-shadow:0 4px 20px rgba(108,99,255,0.4);margin-top:8px;transition:transform 0.1s}
.btn-login:active{transform:scale(0.97)}
.login-err{font-size:12px;color:var(--red);text-align:center;margin-top:12px;font-weight:700;min-height:18px}

/* ── 공통 헤더 ── */
.header{padding:46px 18px 14px;flex-shrink:0;position:relative;overflow:hidden;border-bottom:1px solid var(--border)}
.header.admin-mode{background:linear-gradient(135deg,#1a1a3e 0%,#0d0f2a 100%)}
.header.worker-mode{background:linear-gradient(135deg,#0a1f1a 0%,#051510 100%)}
.header::before{content:'';position:absolute;top:-40px;right:-30px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(108,99,255,0.12) 0%,transparent 70%)}
.header-row{display:flex;align-items:flex-end;justify-content:space-between;position:relative;z-index:1}
.header-label{font-size:10px;letter-spacing:3px;margin-bottom:3px;font-weight:500}
.admin-mode .header-label{color:var(--accent3)}
.worker-mode .header-label{color:var(--teal2)}
.header-title{font-size:22px;font-weight:900;color:#fff}
.header-date{font-size:10px;color:var(--sub);margin-top:2px}
.header-actions{display:flex;gap:8px;align-items:flex-end}
.hbtn{border-radius:12px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;transition:all 0.15s;border:none}
.admin-mode .hbtn{background:rgba(108,99,255,0.15);border:1.5px solid rgba(108,99,255,0.3)}
.worker-mode .hbtn{background:rgba(0,212,170,0.15);border:1.5px solid rgba(0,212,170,0.3)}
.hbtn:active{transform:scale(0.91)}
.logout-btn{font-size:11px;padding:6px 10px;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:700;border:none}
.admin-mode .logout-btn{background:rgba(108,99,255,0.1);color:var(--accent3)}
.worker-mode .logout-btn{background:rgba(0,212,170,0.1);color:var(--teal2)}

/* ── 요약바 ── */
.summary-bar{display:grid;gap:6px;padding:10px 14px;flex-shrink:0;background:var(--card2);border-bottom:1px solid var(--border)}
.summary-bar.cols3{grid-template-columns:repeat(3,1fr)}
.summary-bar.cols2{grid-template-columns:repeat(2,1fr)}
.sum-item{text-align:center;padding:9px 4px;background:var(--card);border-radius:10px;border-top:2px solid var(--accent)}
.sum-item.g{border-top-color:var(--green)}
.sum-item.t{border-top-color:var(--teal)}
.sum-item.o{border-top-color:var(--orange)}
.sum-val{font-size:14px;font-weight:900;color:var(--accent3);line-height:1.2}
.sum-item.g .sum-val{color:var(--green2)}
.sum-item.t .sum-val{color:var(--teal2)}
.sum-item.o .sum-val{color:var(--orange2)}
.sum-lbl{font-size:9px;color:var(--sub);margin-top:3px}

/* ── 탭 ── */
.tabs{display:flex;padding:10px 14px 0;gap:6px;flex-shrink:0;background:var(--card2)}
.tab{flex:1;padding:10px 0;border:none;font-size:11px;font-weight:700;cursor:pointer;transition:all 0.2s;font-family:inherit;border-radius:10px 10px 0 0;border-bottom:2px solid transparent}
.tab.active.admin{background:var(--card);color:var(--accent2);border-bottom-color:var(--accent)}
.tab.active.worker{background:var(--card);color:var(--teal2);border-bottom-color:var(--teal)}
.tab:not(.active){background:transparent;color:var(--sub)}

/* ── 콘텐츠 ── */
.content{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch;background:var(--card)}

/* ── 폼 공통 ── */
.field{margin-bottom:12px}
.field label{display:block;font-size:10px;color:var(--sub);font-weight:700;letter-spacing:0.5px;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;background:var(--card2);border:1.5px solid var(--border);border-radius:10px;padding:11px 13px;font-size:15px;color:var(--text);outline:none;font-family:inherit;-webkit-appearance:none;transition:border 0.2s}
.field input:focus,.field select:focus{border-color:var(--accent)}
.btn-primary{width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:900;cursor:pointer;font-family:inherit;background:linear-gradient(135deg,var(--accent),#8b83ff);color:#fff;box-shadow:0 4px 20px rgba(108,99,255,0.3);transition:transform 0.1s;margin-bottom:10px}
.btn-primary.green{background:linear-gradient(135deg,#00a882,#00d4aa);box-shadow:0 4px 20px rgba(0,212,170,0.3);color:#001a14}
.btn-primary.teal{background:linear-gradient(135deg,#007a6a,#00bcd4);box-shadow:0 4px 20px rgba(0,188,212,0.3);color:#001a14}
.btn-primary:active{transform:scale(0.97)}
.btn-secondary{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:12px;font-size:13px;color:var(--sub);background:transparent;cursor:pointer;font-family:inherit;margin-bottom:8px}

/* ── 관리자: 배달원 카드 ── */
.worker-card{background:var(--card2);border-radius:14px;padding:14px;margin-bottom:10px;border-left:4px solid var(--accent);display:flex;align-items:center;gap:12px}
.worker-avatar{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;flex-shrink:0}
.worker-avatar.admin-av{background:linear-gradient(135deg,var(--accent),#8b83ff)}
.worker-avatar.worker-av{background:linear-gradient(135deg,var(--teal),var(--teal2))}
.worker-info{flex:1;min-width:0}
.worker-name{font-size:15px;font-weight:900}
.worker-prices{font-size:11px;color:var(--sub);margin-top:3px}
.worker-btns{display:flex;gap:6px;flex-shrink:0}
.wbtn{padding:7px 10px;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.wbtn-edit{background:rgba(108,99,255,0.15);color:var(--accent2)}
.wbtn-del{background:rgba(255,71,87,0.12);color:var(--red)}

/* ── 관리자: 일별 입력 ── */
.date-nav{display:flex;align-items:center;justify-content:space-between;background:var(--card2);border-radius:12px;padding:10px 14px;margin-bottom:14px;border:1.5px solid var(--border)}
.date-nav-btn{background:transparent;border:none;color:var(--sub);font-size:20px;cursor:pointer;padding:2px 8px;line-height:1}
.date-nav-label{font-size:14px;font-weight:900;color:var(--text)}
.date-nav-sub{font-size:10px;color:var(--sub);text-align:center;margin-top:2px}
.daily-worker-row{background:var(--card2);border-radius:14px;padding:13px 14px;margin-bottom:8px;border:1.5px solid var(--border);transition:border-color 0.2s}
.daily-worker-row.has-data{border-color:rgba(108,99,255,0.4)}
.daily-row-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.daily-avatar{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent),#8b83ff);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff;flex-shrink:0}
.daily-name{font-size:14px;font-weight:700;flex:1}
.daily-total-badge{font-size:12px;font-weight:900;color:var(--green2);background:rgba(0,212,170,0.1);padding:3px 9px;border-radius:20px}
.daily-inputs{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.daily-field label{display:block;font-size:10px;color:var(--sub);font-weight:700;margin-bottom:4px}
.daily-field input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:9px;padding:10px 8px;font-size:22px;font-weight:900;color:var(--text);text-align:center;outline:none;font-family:inherit;-webkit-appearance:none;transition:border 0.2s}
.daily-field input:focus{border-color:var(--accent);background:var(--card2)}
.daily-field-sub{font-size:10px;color:var(--sub);text-align:center;margin-top:4px;min-height:14px}

/* ── 배달원: 입력 ── */
.my-input-header{background:linear-gradient(135deg,rgba(0,188,212,0.12),rgba(0,188,212,0.04));border:1.5px solid rgba(0,188,212,0.2);border-radius:14px;padding:16px;margin-bottom:14px}
.my-input-name{font-size:18px;font-weight:900;color:var(--teal2);margin-bottom:4px}
.my-input-sub{font-size:11px;color:var(--sub)}
.my-qty-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.my-qty-box{background:var(--card2);border-radius:14px;padding:16px;border:1.5px solid var(--border)}
.my-qty-label{font-size:11px;font-weight:700;margin-bottom:10px}
.my-qty-label.a{color:var(--orange2)}
.my-qty-label.b{color:var(--accent2)}
.my-qty-input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:14px 8px;font-size:32px;font-weight:900;color:var(--text);text-align:center;outline:none;font-family:inherit;-webkit-appearance:none;transition:border 0.2s}
.my-qty-input:focus{border-color:var(--teal)}
.my-qty-sub{font-size:11px;color:var(--sub);text-align:center;margin-top:8px;min-height:16px}
.my-calc-box{background:linear-gradient(135deg,#0a1f1a,#061410);border:1.5px solid rgba(0,188,212,0.2);border-radius:14px;padding:14px;margin-bottom:14px}
.my-calc-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:12px}
.my-calc-lbl{color:var(--sub)}
.my-calc-val{font-weight:700}
.my-calc-sep{border:none;border-top:1px solid rgba(0,188,212,0.15);margin:8px 0}
.my-calc-total{font-size:22px;font-weight:900;color:var(--teal2)}

/* ── 기록 카드 ── */
.rec-day-card{background:var(--card2);border-radius:14px;padding:14px;margin-bottom:10px;border:1.5px solid var(--border)}
.rec-day-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.rec-day-date{font-size:15px;font-weight:900}
.rec-day-total{font-size:13px;font-weight:900;color:var(--green2)}
.rec-worker-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg);border-radius:9px;margin-bottom:4px}
.rec-worker-name{font-size:12px;font-weight:700;flex:1}
.rec-worker-qty{font-size:11px;color:var(--sub);margin-right:6px}
.rec-worker-pay{font-size:13px;font-weight:900;color:var(--accent3)}
.rec-btns{display:flex;gap:6px;margin-top:10px}
.rec-btn{flex:1;padding:8px;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.rec-btn-edit{background:rgba(108,99,255,0.15);color:var(--accent2)}
.rec-btn-del{background:rgba(255,71,87,0.12);color:var(--red)}

/* ── 배달원 내 기록 카드 ── */
.my-rec-card{background:var(--card2);border-radius:14px;padding:14px;margin-bottom:8px;border-left:4px solid var(--teal)}
.my-rec-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.my-rec-date{font-size:14px;font-weight:900;color:var(--teal2)}
.my-rec-pay{font-size:15px;font-weight:900;color:var(--green2)}
.my-rec-detail{font-size:11px;color:var(--sub)}

/* ── 통계 ── */
.period-tabs{display:flex;gap:6px;margin-bottom:12px}
.period-tab{flex:1;padding:9px 0;border:1.5px solid var(--border);border-radius:10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;background:transparent;color:var(--sub);transition:all 0.2s}
.period-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.period-tab.active.worker-tab{background:var(--teal);border-color:var(--teal);color:#001a14}
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.month-nav-btn{background:var(--card2);border:1.5px solid var(--border);border-radius:10px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;color:var(--sub)}
.month-nav-title{font-size:16px;font-weight:900}
.stat-summary{background:linear-gradient(135deg,#131625,#0f1120);border:1.5px solid rgba(108,99,255,0.25);border-radius:14px;padding:16px;margin-bottom:12px}
.stat-summary.worker-stat{background:linear-gradient(135deg,#0a1f1a,#061410);border-color:rgba(0,188,212,0.25)}
.stat-title{font-size:10px;letter-spacing:0.5px;margin-bottom:12px;font-weight:700}
.stat-title.admin{color:var(--accent3)}
.stat-title.worker{color:var(--teal2)}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:12px}
.stat-row-lbl{color:var(--sub)}
.stat-row-val{font-weight:700}
.stat-sep{border:none;border-top:1px solid var(--border);margin:8px 0}
.stat-total{font-size:22px;font-weight:900;color:var(--green2);margin-top:4px}
.worker-stat-card{background:var(--card2);border-radius:14px;padding:13px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer}
.wsc-rank{font-size:22px;font-weight:900;color:var(--sub2);width:28px;text-align:center;flex-shrink:0}
.wsc-avatar{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#8b83ff);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:#fff;flex-shrink:0}
.wsc-info{flex:1;min-width:0}
.wsc-name{font-size:14px;font-weight:900}
.wsc-detail{font-size:10px;color:var(--sub);margin-top:2px}
.wsc-pay{text-align:right}
.wsc-gross{font-size:15px;font-weight:900;color:var(--accent3)}
.wsc-net{font-size:11px;color:var(--green2);margin-top:2px}
.wsc-qty{font-size:10px;color:var(--sub);margin-top:1px}
.back-btn{display:flex;align-items:center;gap:6px;background:var(--card2);border:1.5px solid var(--border);border-radius:10px;padding:9px 14px;font-size:13px;font-weight:700;color:var(--sub);cursor:pointer;margin-bottom:14px;font-family:inherit}
.detail-header{background:linear-gradient(135deg,rgba(108,99,255,0.15),rgba(108,99,255,0.05));border:1.5px solid rgba(108,99,255,0.2);border-radius:14px;padding:16px;margin-bottom:12px}
.detail-day-row{background:var(--card2);border-radius:10px;padding:11px 13px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.ddr-date{font-size:12px;font-weight:700;flex:1}
.ddr-qty{font-size:11px;color:var(--sub)}
.ddr-pay{font-size:13px;font-weight:900;color:var(--accent3)}
.ddr-net{font-size:10px;color:var(--green2);text-align:right}

/* ── 모달 ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center}
.overlay.show{display:flex}
.dialog{background:var(--card);border-radius:18px;padding:24px;width:290px;text-align:center;border:1px solid var(--border)}
.dialog h3{font-size:16px;margin-bottom:8px}
.dialog p{font-size:13px;color:var(--sub);margin-bottom:20px;line-height:1.5}
.dialog-btns{display:flex;gap:10px}
.dialog-btns button{flex:1;padding:13px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.dbtn-cancel{background:var(--card2);color:var(--sub)}
.dbtn-confirm{background:var(--red);color:#fff}
.bsoverlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;align-items:flex-end;justify-content:center}
.bsoverlay.show{display:flex}
.bsheet{background:var(--card);border-radius:22px 22px 0 0;padding:22px 18px 36px;width:100%;max-width:500px;border-top:1px solid var(--border)}
.bs-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
.bs-title{font-size:15px;font-weight:900;margin-bottom:4px}
.bs-sub{font-size:11px;color:var(--sub);margin-bottom:18px}
.bk-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.bk-btn{padding:14px 10px;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;line-height:1.6}
.bk-btn:active{transform:scale(0.96)}
.bk-export{background:linear-gradient(135deg,#1a3a5c,#1e4a7a);color:#7bbfff;border:1.5px solid #2a5a9a}
.bk-import{background:linear-gradient(135deg,#1a3a1a,#1e4a1e);color:#7fd67f;border:1.5px solid #2a6a2a}
.bk-row{width:100%;padding:13px;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:10px;border:none}
.bk-csv{background:rgba(0,212,170,0.1);color:var(--green2);border:1.5px solid rgba(0,212,170,0.3)}
.bk-copy{background:rgba(108,99,255,0.1);color:var(--accent3);border:1.5px solid rgba(108,99,255,0.3)}
.bk-reset{background:rgba(255,71,87,0.1);color:var(--red);border:1.5px solid rgba(255,71,87,0.3)}
.bk-close{background:transparent;color:var(--sub);border:1.5px solid var(--border)}

/* ── 배달원 추가 시트 ── */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--accent);color:var(--accent3);padding:11px 22px;border-radius:28px;font-size:13px;font-weight:700;z-index:999;pointer-events:none;opacity:0;transition:opacity 0.3s;white-space:nowrap}
.toast.show{opacity:1}
.loading{display:flex;align-items:center;justify-content:center;height:200px;flex-direction:column;gap:12px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-txt{font-size:12px;color:var(--sub)}
.empty{text-align:center;color:var(--sub2);padding:50px 0;font-size:13px;line-height:2.4}
.sec-title{font-size:11px;color:var(--sub);font-weight:700;letter-spacing:0.5px;margin-bottom:10px}
.input-subtabs{display:flex;gap:6px;margin-bottom:12px}
.input-subtab{flex:1;padding:9px 0;border:1.5px solid var(--border);border-radius:10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;background:transparent;color:var(--sub);transition:all 0.2s}
.input-subtab.active{background:var(--accent);border-color:var(--accent);color:#fff}
</style>
</head>
<body>

<!-- ══ 로그인 화면 ══ -->
<div class="login-wrap hide" id="login-wrap">
  <div class="login-logo">📊</div>
  <div class="login-title">배송 관리자</div>
  <div class="login-sub">DELIVERY MANAGER</div>

];

// ══════════════════════════════════════════

const SUPA_URL = 'https://vvivcdwmommvgvbpxwxk.supabase.co';
const SUPA_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ2aXZjZHdtb21tdmd2YnB4d3hrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQxMTY1MzcsImV4cCI6MjA4OTY5MjUzN30.bjHhtHjO0kmb6lKu9cyZea8n1lYz9IoMuXFD2CKz9oE';

// ══════════════════════════════════════════

const TAX = 0.033;
const DAYS = ['일','월','화','수','목','금','토'];

let workers = [];
let dailyRecords = [];
let tab = '';

// 관리자 전용
let adminInputDate = today();

function today(){ return new Date().toISOString().slice(0,10); }
function won(n){ return Number(n).toLocaleString()+'원'; }
function wonShort(n){ return n>=10000?Math.round(n/1000)/10+'만원':won(n); }
function fmtDate(d){ const x=new Date(d+'T00:00:00'); return `${x.getMonth()+1}월 ${x.getDate()}일`; }
function fmtDay(d){ return DAYS[new Date(d+'T00:00:00').getDay()]+'요일'; }
function av(name){ return name?name[0]:'?'; }
function calcPay(w, qA, qB){
  const a=Number(qA)||0, b=Number(qB)||0;
  const gross=a*(w.priceA||0)+b*(w.priceB||0);
  const net=Math.round(gross*(1-TAX));
  return {a,b,qty:a+b,gross,net};
}

// ══════════════════════════════════════════
//  데이터 로드
// ══════════════════════════════════════════
async function loadAll(){
  isLoading=true; render();
  try {
    const {data:w,error:we}=await db.from('workers').select('*').order('id');
    if(we) throw we;
    workers=(w||[]).map(x=>({id:x.id,name:x.name,priceA:x.price_a,priceB:x.price_b,loginId:x.login_id||''}));

    const {data:r,error:re}=await db.from('daily_records').select('*').order('work_date',{ascending:false});
    if(re) throw re;
    const map={};
    (r||[]).forEach(row=>{
      const d=row.work_date;
      if(!map[d]) map[d]={date:d,data:{}};
      map[d].data[row.worker_id]={qtyA:String(row.qty_a||0),qtyB:String(row.qty_b||0)};
    });
    dailyRecords=Object.values(map).sort((a,b)=>b.date.localeCompare(a.date));
  } catch(e){ showToast('❌ 로드 실패: '+e.message); }
  isLoading=false;
  updateSummary();
  render();
}

// ══════════════════════════════════════════
//  요약 업데이트
// ══════════════════════════════════════════
function updateSummary(){
  if(!currentUser) return;
  const isAdmin = currentUser.role==='admin';
  const m = today().slice(0,7);
  if(isAdmin){
    document.getElementById('s1').textContent=workers.length+'명';
    document.getElementById('s1l').textContent='등록 배달원';
    const mRecs=dailyRecords.filter(r=>r.date.startsWith(m));
    let mTotal=0;
    mRecs.forEach(r=>Object.keys(r.data||{}).forEach(wid=>{
      const w=workers.find(x=>x.id===Number(wid));
      if(w) mTotal+=calcPay(w,r.data[wid].qtyA,r.data[wid].qtyB).gross;
    }));
    document.getElementById('s2').textContent=wonShort(mTotal);
    document.getElementById('s2l').textContent='이번 달 총액';
    const tRec=dailyRecords.find(r=>r.date===today());
    let tQty=0;
    if(tRec) Object.values(tRec.data||{}).forEach(d=>{tQty+=(Number(d.qtyA)||0)+(Number(d.qtyB)||0);});
    document.getElementById('s3').textContent=tQty.toLocaleString()+'건';
    document.getElementById('s3l').textContent='오늘 총 배송';
  } else {
    const w=workers.find(x=>x.id===currentUser.workerId);
    const mRecs=dailyRecords.filter(r=>r.date.startsWith(m)&&r.data?.[currentUser.workerId]);
    const mQty=mRecs.reduce((s,r)=>s+(Number(r.data[currentUser.workerId]?.qtyA)||0)+(Number(r.data[currentUser.workerId]?.qtyB)||0),0);
    const mGross=mRecs.reduce((s,r)=>{ if(!w) return s; return s+calcPay(w,r.data[currentUser.workerId]?.qtyA,r.data[currentUser.workerId]?.qtyB).gross; },0);
    const tRec=dailyRecords.find(r=>r.date===today());
    const tD=tRec?.data?.[currentUser.workerId];
    const tQty=tD?(Number(tD.qtyA)||0)+(Number(tD.qtyB)||0):0;
    document.getElementById('s1').textContent=mRecs.length+'일';
    document.getElementById('s1l').textContent='이번 달 배송일';
    document.getElementById('s2').textContent=mQty.toLocaleString()+'건';
    document.getElementById('s2l').textContent='이번 달 배송량';
    document.getElementById('s3').textContent=tQty.toLocaleString()+'건';
    document.getElementById('s3l').textContent='오늘 배송량';
    // 단가는 요약에 표시 안 함
  }
}

// ══════════════════════════════════════════
//  탭 전환
// ══════════════════════════════════════════
function switchTab(t){
  tab=t; detailWorkerId=null;
  ['daily','records','stats','workers'].forEach(x=>{
    const el=document.getElementById('tab-'+x);
    if(el) el.className='tab'+(x===t?' active admin':'');
  });
  render();
}
function switchMyTab(t){
  myTab=t;
  ['my-input','my-records','my-stats'].forEach(x=>{
    const el=document.getElementById('tab-'+x);
    if(el) el.className='tab'+(x.replace('my-','')===(t)?(' active worker'):'');
  });
  render();
}

// ══════════════════════════════════════════
//  렌더
// ══════════════════════════════════════════
function render(){
  const c=document.getElementById('content');
  if(!currentUser){ c.innerHTML=''; return; }
  if(isLoading){ c.innerHTML=`<div class="loading"><div class="spinner"></div><div class="loading-txt">데이터 불러오는 중...</div></div>`; return; }
  if(currentUser.role==='admin'){
    if(tab==='daily') c.innerHTML=renderAdminDaily();
    else if(tab==='records') c.innerHTML=renderAdminRecords();
    else if(tab==='stats') c.innerHTML=detailWorkerId?renderWorkerDetail():renderAdminStats();
    else c.innerHTML=renderAdminWorkers();
    if(tab==='daily') bindAdminDailyEvents();
  } else {
    if(myTab==='input') c.innerHTML=renderMyInput();
    else if(myTab==='records') c.innerHTML=renderMyRecords();
    else c.innerHTML=renderMyStats();
    if(myTab==='input') bindMyInputEvents();
  }
}

// ══════════════════════════════════════════
//  관리자: 일별 입력

function renderAdminDaily(){
  if(!workers.length) return `<div class="empty">👥 먼저 배달원을 등록해주세요<br><span style="font-size:12px">👥 배달원 탭에서 추가하세요</span></div>`;
  const rec=dailyRecords.find(r=>r.date===adminInputDate);
  const isEdit=!!rec;
  const recData=rec?.data||{};
  const dow=DAYS[new Date(adminInputDate+'T00:00:00').getDay()];
  const subTabs=`<div class="input-subtabs">
    <button class="input-subtab ${adminInputMode==='date'?'active':''}" onclick="adminInputMode='date';adminInputData={};render()">📅 날짜별</button>
    <button class="input-subtab ${adminInputMode==='worker'?'active':''}" onclick="adminInputMode='worker';render()">👤 배달원별</button>
  </div>`;
  if(adminInputMode==='worker') return subTabs+renderAdminWorkerMode();
  return subTabs+`
    <div class="date-nav">
      <button class="date-nav-btn" onclick="changeAdminDate(-1)">◀</button>
      <div style="text-align:center">
        <div class="date-nav-label">${fmtDate(adminInputDate)} (${dow}요일)</div>
        <div class="date-nav-sub">${isEdit?'✏️ 수정 중':'새 기록'}</div>
      </div>
      <button class="date-nav-btn" onclick="changeAdminDate(1)">▶</button>
    </div>
    ${workers.map(w=>{
      const prev=recData[w.id]||{};
      const qa=adminInputData[w.id]?.qtyA??prev.qtyA??'';
      const qb=adminInputData[w.id]?.qtyB??prev.qtyB??'';
      const p=calcPay(w,qa,qb);
      return `<div class="daily-worker-row ${p.qty>0?'has-data':''}" id="dwr-${w.id}">
        <div class="daily-row-top">
          <div class="daily-avatar">${av(w.name)}</div>
          <div class="daily-name">${w.name}</div>
          ${p.qty>0?`<div class="daily-total-badge">${won(p.gross)}</div>`:''}
        </div>
        <div class="daily-inputs">
          <div class="daily-field">
            <label>🅰 물품A (${(w.priceA||0).toLocaleString()}원)</label>
            <input type="number" id="qa-${w.id}" value="${qa}" placeholder="0" inputmode="numeric" min="0">
            <div class="daily-field-sub" id="sub-a-${w.id}">${qa?won(Number(qa)*(w.priceA||0)):''}</div>
          </div>
          <div class="daily-field">
            <label>🅱 물품B (${(w.priceB||0).toLocaleString()}원)</label>
            <input type="number" id="qb-${w.id}" value="${qb}" placeholder="0" inputmode="numeric" min="0">
            <div class="daily-field-sub" id="sub-b-${w.id}">${qb?won(Number(qb)*(w.priceB||0)):''}</div>
          </div>
        </div>
      </div>`;
    }).join('')}
    <div style="height:8px"></div>
    <button class="btn-primary green" onclick="saveAdminDaily()">${isEdit?'✏️ 수정 저장':'💾 저장하기'}</button>
    ${isEdit?`<button class="btn-secondary" onclick="askDeleteRecord('${adminInputDate}')">🗑 이 날 기록 삭제</button>`:''}
    <div style="height:20px"></div>`;
}

function renderAdminWorkerMode(){
  if(!workers.length) return `<div class="empty">배달원이 없어요</div>`;
  const selW = workers[0];
  const recentDates=[];
  for(let i=0;i<14;i++){
    const d=new Date(); d.setDate(d.getDate()-i);
    recentDates.push(d.toISOString().slice(0,10));
  }
  return `<div class="sec-title">배달원 선택 후 날짜별 수량 수정</div>
  ${workers.map(w=>{
    const mRec=dailyRecords.filter(r=>r.date.startsWith(today().slice(0,7))&&r.data?.[w.id]);
    const mQty=mRec.reduce((s,r)=>s+(Number(r.data[w.id]?.qtyA)||0)+(Number(r.data[w.id]?.qtyB)||0),0);
    const mGross=mRec.reduce((s,r)=>s+calcPay(w,r.data[w.id]?.qtyA,r.data[w.id]?.qtyB).gross,0);
    return `<div class="worker-card" style="cursor:pointer" onclick="adminInputMode='date';adminInputDate='${today()}';adminInputData={};render()">
      <div class="daily-avatar">${av(w.name)}</div>
      <div style="flex:1">
        <div style="font-size:14px;font-weight:900">${w.name}</div>
        <div style="font-size:11px;color:var(--sub);margin-top:2px">이번 달 ${mQty.toLocaleString()}건 · ${won(mGross)}</div>
      </div>

}

function bindAdminDailyEvents(){
  workers.forEach(w=>{
    ['qa','qb'].forEach(prefix=>{
      const el=document.getElementById(`${prefix}-${w.id}`);
      if(!el) return;
      el.addEventListener('input',()=>{
        if(!adminInputData[w.id]) adminInputData[w.id]={qtyA:'',qtyB:''};
        if(prefix==='qa') adminInputData[w.id].qtyA=el.value;
        else adminInputData[w.id].qtyB=el.value;
        const qA=document.getElementById(`qa-${w.id}`)?.value||'';
        const qB=document.getElementById(`qb-${w.id}`)?.value||'';
        const p=calcPay(w,qA,qB);
        const subA=document.getElementById(`sub-a-${w.id}`);
        const subB=document.getElementById(`sub-b-${w.id}`);
        if(subA) subA.textContent=qA?won(Number(qA)*(w.priceA||0)):'';
        if(subB) subB.textContent=qB?won(Number(qB)*(w.priceB||0)):'';
        const row=document.getElementById(`dwr-${w.id}`);
        if(row) row.classList.toggle('has-data',p.qty>0);
        const badge=document.querySelector(`#dwr-${w.id} .daily-total-badge`);
        if(p.qty>0){
          if(badge) badge.textContent=won(p.gross);
          else{
            const nm=document.querySelector(`#dwr-${w.id} .daily-name`);
            if(nm){ const b=document.createElement('div'); b.className='daily-total-badge'; b.textContent=won(p.gross); nm.after(b); }
          }
        } else if(badge) badge.remove();
      });
    });
  });
}

function changeAdminDate(dir){
  const d=new Date(adminInputDate+'T00:00:00');
  d.setDate(d.getDate()+dir);
  adminInputDate=d.toISOString().slice(0,10);
  adminInputData={}; render();
}

async function saveAdminDaily(){
  const data={};
  workers.forEach(w=>{
    const qa=document.getElementById(`qa-${w.id}`)?.value||'';
    const qb=document.getElementById(`qb-${w.id}`)?.value||'';
    if(qa||qb) data[w.id]={qtyA:qa,qtyB:qb};
  });
  if(!Object.keys(data).length){ showToast('⚠️ 수량을 입력해주세요'); return; }
  showToast('💾 저장 중...');
  try {
    await saveDailyToDB(adminInputDate,data);
    const idx=dailyRecords.findIndex(r=>r.date===adminInputDate);
    if(idx>=0) dailyRecords[idx].data=data;
    else dailyRecords.unshift({date:adminInputDate,data});
    dailyRecords.sort((a,b)=>b.date.localeCompare(a.date));
    adminInputData={}; updateSummary();
    showToast('✅ 저장 완료!'); switchTab('records');
  } catch(e){ showToast('❌ 저장 실패: '+e.message); }
}

function renderAdminStats(){
  const pBar=`<div class="period-tabs">
    <button class="period-tab ${statPeriod==='month'?'active':''}" onclick="statPeriod='month';render()">🗓 월별</button>
    <button class="period-tab ${statPeriod==='all'?'active':''}" onclick="statPeriod='all';render()">📊 전체</button>
  </div>`;
  if(!dailyRecords.length||!workers.length) return pBar+`<div class="empty">📊 기록이 쌓이면 정산이 보여요!</div>`;
  let filtered=[], navHtml='', title='';
  if(statPeriod==='month'){
    const ym=`${statYear}-${String(statMonth+1).padStart(2,'0')}`;
    filtered=dailyRecords.filter(r=>r.date.startsWith(ym));
    title=`${statYear}년 ${statMonth+1}월 정산`;
    navHtml=`<div class="month-nav">
      <div class="month-nav-btn" onclick="statMonth--;if(statMonth<0){statMonth=11;statYear--;}render()">◀</div>
      <div class="month-nav-title">${statYear}년 ${statMonth+1}월</div>
      <div class="month-nav-btn" onclick="statMonth++;if(statMonth>11){statMonth=0;statYear++;}render()">▶</div>
    </div>`;
  } else { filtered=dailyRecords; title='전체 정산'; }
  if(!filtered.length) return pBar+navHtml+`<div class="empty" style="padding:40px 0">해당 기간에 기록이 없어요</div>`;
  const totals={};
  workers.forEach(w=>{ totals[w.id]={w,qty:0,qtyA:0,qtyB:0,gross:0,net:0,days:0}; });
  let gGross=0,gNet=0,gQty=0;
  filtered.forEach(r=>{
    Object.entries(r.data||{}).forEach(([wid,d])=>{
      const w=workers.find(x=>x.id===Number(wid));
      if(!w||!totals[w.id]) return;
      const p=calcPay(w,d.qtyA,d.qtyB);
      if(p.qty>0){
        totals[w.id].qty+=p.qty; totals[w.id].qtyA+=p.a; totals[w.id].qtyB+=p.b;
        totals[w.id].gross+=p.gross; totals[w.id].net+=p.net; totals[w.id].days++;
        gGross+=p.gross; gNet+=p.net; gQty+=p.qty;
      }
    });
  });
  const sorted=Object.values(totals).filter(x=>x.gross>0).sort((a,b)=>b.gross-a.gross);
  return pBar+navHtml+`
    <div class="stat-summary">
      <div class="stat-title admin">💰 ${title} 요약</div>
      <div class="stat-row"><span class="stat-row-lbl">📦 총 배송량</span><span class="stat-row-val">${gQty.toLocaleString()}건</span></div>
      <div class="stat-row"><span class="stat-row-lbl">📅 기록일수</span><span class="stat-row-val">${filtered.length}일</span></div>
      <div class="stat-row"><span class="stat-row-lbl">👥 활동 배달원</span><span class="stat-row-val">${sorted.length}명</span></div>
      <hr class="stat-sep">
      <div class="stat-total">${won(gGross)}</div>
      <div style="font-size:13px;font-weight:900;color:var(--green2);margin-top:4px">실수령 합계: ${won(gNet)}</div>
      <div style="font-size:10px;color:var(--red);margin-top:3px">세금(3.3%): -${won(gGross-gNet)}</div>
    </div>
    <div class="sec-title">개인별 정산 <span style="font-weight:400;color:var(--sub2)">(탭하면 상세)</span></div>
    ${sorted.map((t,i)=>`<div class="worker-stat-card" onclick="detailWorkerId=${t.w.id};render()">
      <div class="wsc-rank">${i+1}</div>
      <div class="wsc-avatar">${av(t.w.name)}</div>
      <div class="wsc-info"><div class="wsc-name">${t.w.name}</div><div class="wsc-detail">🅰${t.qtyA.toLocaleString()} · 🅱${t.qtyB.toLocaleString()} · ${t.days}일</div></div>
      <div class="wsc-pay"><div class="wsc-gross">${won(t.gross)}</div><div class="wsc-net">실수령 ${won(t.net)}</div><div class="wsc-qty">${t.qty.toLocaleString()}건</div></div>
    </div>`).join('')}
    <div style="height:20px"></div>`;
}

function openWorkerSheet(id){
  editWorkerId=id;
  document.getElementById('ws-title').textContent=id?'👤 배달원 수정':'👤 배달원 추가';
  const w=id?workers.find(x=>x.id===id):null;
  document.getElementById('ws-name').value=w?.name||'';
  document.getElementById('ws-id').value=w?.loginId||'';
  document.getElementById('ws-pw').value='';
  document.getElementById('ws-pa').value=w?.priceA||'';
  document.getElementById('ws-pb').value=w?.priceB||'';
  document.getElementById('worker-sheet').classList.add('show');
  setTimeout(()=>document.getElementById('ws-name').focus(),300);
}
function closeWorkerSheet(){ document.getElementById('worker-sheet').classList.remove('show'); editWorkerId=null; }

async function saveWorker(){
  const name=document.getElementById('ws-name').value.trim();
  const loginId=document.getElementById('ws-id').value.trim();
  const pw=document.getElementById('ws-pw').value.trim();
  const pa=Number(document.getElementById('ws-pa').value)||0;
  const pb=Number(document.getElementById('ws-pb').value)||0;
  if(!name){ showToast('⚠️ 이름을 입력해주세요'); return; }
  try {
    if(editWorkerId){
      const upd={name,price_a:pa,price_b:pb};
      if(loginId) upd.login_id=loginId;
      const {error}=await db.from('workers').update(upd).eq('id',editWorkerId);
      if(error) throw error;
      workers=workers.map(w=>w.id===editWorkerId?{...w,name,priceA:pa,priceB:pb,loginId:loginId||w.loginId}:w);
      // ACCOUNTS에 반영 안내
      if(loginId&&pw) showToast(`✅ 수정 완료 — 코드의 ACCOUNTS에 {id:'${loginId}',pw:'${pw}',role:'worker',name:'${name}',workerId:${editWorkerId}} 추가하세요!`);
      else showToast('✅ 수정 완료');
    } else {
      const ins={name,price_a:pa,price_b:pb};
      if(loginId) ins.login_id=loginId;
      const {data,error}=await db.from('workers').insert(ins).select().single();
      if(error) throw error;
      workers.push({id:data.id,name,priceA:pa,priceB:pb,loginId:loginId||''});
      if(loginId&&pw) showToast(`✅ 추가 완료 — 코드의 ACCOUNTS에 {id:'${loginId}',pw:'${pw}',role:'worker',name:'${name}',workerId:${data.id}} 추가하세요!`);
      else showToast('✅ 배달원 추가 완료');
    }
    closeWorkerSheet(); updateSummary(); render();
  } catch(e){ showToast('❌ 저장 실패: '+e.message); }
}

function askDeleteWorker(id){
  const w=workers.find(x=>x.id===id);
  openConfirm('🗑 배달원 삭제',`${w?.name}님을 삭제할까요?`,'삭제',async()=>{
    try{
      await db.from('workers').delete().eq('id',id);
      workers=workers.filter(x=>x.id!==id);
      updateSummary(); render(); showToast('🗑 삭제됨');
    }catch(e){ showToast('❌ '+e.message); }
  });
}

function refreshMyCalc(w,qa,qb,p){
  const box=document.querySelector('.my-calc-box');
  if(p.qty>0){
    if(box){
      box.querySelector('.my-calc-total').textContent=won(p.gross);
      const rows=box.querySelectorAll('.my-calc-val');
      if(rows[0]) rows[0].textContent=p.qty.toLocaleString()+'건';
      box.querySelector('[style*="teal2"]').textContent=`실수령 (3.3% 공제): ${won(p.net)}`;
    } else {
      // Re-render just the calc area - minimal
      const btn=document.querySelector('.btn-primary.teal');
      if(btn){
        const div=document.createElement('div');
        div.className='my-calc-box';
        div.innerHTML=`<div class="my-calc-row"><span class="my-calc-lbl">📦 총 배송</span><span class="my-calc-val">${p.qty.toLocaleString()}건</span></div>
        <hr class="my-calc-sep">
        <div style="font-size:10px;color:var(--sub);margin-bottom:4px">예상 수령액</div>
        <div class="my-calc-total">${won(p.gross)}</div>
        <div style="font-size:11px;color:var(--teal2);margin-top:4px">실수령 (3.3% 공제): ${won(p.net)}</div>`;
        btn.before(div);
      }
    }
  } else if(box) box.remove();
}

function changeMyDate(dir){
  const d=new Date(myInputDate+'T00:00:00');
  d.setDate(d.getDate()+dir);
  myInputDate=d.toISOString().slice(0,10);
  render();
}

async function saveMyRecord(){
  const w=workers.find(x=>x.id===currentUser.workerId); if(!w) return;
  const qa=document.getElementById('my-qa')?.value||myQtyA||'';
  const qb=document.getElementById('my-qb')?.value||myQtyB||'';
  if(!qa&&!qb){ showToast('⚠️ 수량을 입력해주세요'); return; }
  showToast('💾 저장 중...');
  try {
    const {error}=await db.from('daily_records').upsert({work_date:myInputDate,worker_id:w.id,qty_a:Number(qa)||0,qty_b:Number(qb)||0},{onConflict:'work_date,worker_id'});
    if(error) throw error;
    const idx=dailyRecords.findIndex(r=>r.date===myInputDate);
    const entry={qtyA:qa,qtyB:qb};
    if(idx>=0){ dailyRecords[idx].data[w.id]=entry; }
    else { dailyRecords.unshift({date:myInputDate,data:{[w.id]:entry}}); }
    dailyRecords.sort((a,b)=>b.date.localeCompare(a.date));
    myQtyA=''; myQtyB='';
    updateSummary();
    showToast('✅ 저장 완료!');
    switchMyTab('records');
  } catch(e){ showToast('❌ 저장 실패: '+e.message); }
}

// ══════════════════════════════════════════
//  배달원: 내 기록
// ══════════════════════════════════════════
function renderMyRecords(){
  const w=workers.find(x=>x.id===currentUser.workerId);
  if(!w) return `<div class="empty">배달원 정보 없음</div>`;
  const myRecs=dailyRecords.filter(r=>r.data?.[w.id]);
  if(!myRecs.length) return `<div class="empty">📋 아직 기록이 없어요<br><span style="font-size:12px">오늘 입력 탭에서 입력하세요</span></div>`;
  return myRecs.map(r=>{
    const p=calcPay(w,r.data[w.id].qtyA,r.data[w.id].qtyB);
    return `<div class="my-rec-card">
      <div class="my-rec-head">
        <div class="my-rec-date">${fmtDate(r.date)} <span style="font-size:11px;color:var(--sub)">${fmtDay(r.date)}</span></div>
        <div class="my-rec-pay">${won(p.gross)}</div>
      </div>
      <div class="my-rec-detail">🅰 ${p.a}건 · 🅱 ${p.b}건 · 합계 ${p.qty}건 · 실수령 ${won(p.net)}</div>
    </div>`;
  }).join('')+'<div style="height:20px"></div>';
}

// ══════════════════════════════════════════
//  배달원: 내 통계
// ══════════════════════════════════════════
function renderMyStats(){
  const w=workers.find(x=>x.id===currentUser.workerId);
  if(!w) return `<div class="empty">배달원 정보 없음</div>`;
  const pBar=`<div class="period-tabs">
    <button class="period-tab ${myStatPeriod==='month'?'active worker-tab':''}" onclick="myStatPeriod='month';render()">🗓 이번 달</button>
    <button class="period-tab ${myStatPeriod==='all'?'active worker-tab':''}" onclick="myStatPeriod='all';render()">📊 전체</button>
  </div>`;
  let filtered=[], navHtml='', title='';
  if(myStatPeriod==='month'){
    const ym=`${myStatYear}-${String(myStatMonth+1).padStart(2,'0')}`;
    filtered=dailyRecords.filter(r=>r.date.startsWith(ym)&&r.data?.[w.id]);
    title=`${myStatYear}년 ${myStatMonth+1}월`;
    navHtml=`<div class="month-nav">
      <div class="month-nav-btn" onclick="myStatMonth--;if(myStatMonth<0){myStatMonth=11;myStatYear--;}render()">◀</div>
      <div class="month-nav-title">${myStatYear}년 ${myStatMonth+1}월</div>
      <div class="month-nav-btn" onclick="myStatMonth++;if(myStatMonth>11){myStatMonth=0;myStatYear++;}render()">▶</div>
    </div>`;
  } else {
    filtered=dailyRecords.filter(r=>r.data?.[w.id]);
    title='전체';
  }
  if(!filtered.length) return pBar+navHtml+`<div class="empty" style="padding:40px 0">해당 기간에 기록이 없어요</div>`;
  let tQty=0,tQtyA=0,tQtyB=0,tGross=0,tNet=0;
  filtered.forEach(r=>{
    const p=calcPay(w,r.data[w.id].qtyA,r.data[w.id].qtyB);
    tQty+=p.qty; tQtyA+=p.a; tQtyB+=p.b; tGross+=p.gross; tNet+=p.net;
  });
  const avgQty=filtered.length?Math.round(tQty/filtered.length):0;
  return pBar+navHtml+`
    <div class="stat-summary worker-stat">
      <div class="stat-title worker">📊 ${title} 내 통계</div>
      <div class="stat-row"><span class="stat-row-lbl">📅 배송일수</span><span class="stat-row-val">${filtered.length}일</span></div>
      <div class="stat-row"><span class="stat-row-lbl">🅰 물품A</span><span class="stat-row-val">${tQtyA.toLocaleString()}건</span></div>
      <div class="stat-row"><span class="stat-row-lbl">🅱 물품B</span><span class="stat-row-val">${tQtyB.toLocaleString()}건</span></div>
      <div class="stat-row"><span class="stat-row-lbl">📦 총 배송</span><span class="stat-row-val">${tQty.toLocaleString()}건</span></div>
      <div class="stat-row"><span class="stat-row-lbl">📈 일평균</span><span class="stat-row-val">${avgQty.toLocaleString()}건</span></div>
      <hr class="stat-sep">
      <div class="stat-title worker" style="margin-bottom:6px">💰 예상 수령액</div>
      <div class="stat-total" style="color:var(--teal2)">${won(tGross)}</div>
      <div style="font-size:13px;font-weight:900;color:var(--green2);margin-top:4px">실수령 (3.3% 공제): ${won(tNet)}</div>
      <div style="font-size:10px;color:var(--red);margin-top:3px">세금 공제액: -${won(tGross-tNet)}</div>
    </div>
    <div class="sec-title">일별 내역 (${filtered.length}일)</div>
    ${filtered.map(r=>{ const p=calcPay(w,r.data[w.id].qtyA,r.data[w.id].qtyB);
      return `<div class="detail-day-row">
        <div><div class="ddr-date">${fmtDate(r.date)} <span style="font-size:10px;color:var(--sub)">${fmtDay(r.date)}</span></div><div class="ddr-qty">🅰${p.a}건 · 🅱${p.b}건</div></div>
        <div style="text-align:right"><div class="ddr-pay" style="color:var(--teal2)">${won(p.gross)}</div><div class="ddr-net">실수령 ${won(p.net)}</div></div>
      </div>`;
    }).join('')}
    <div style="height:20px"></div>`;
}

// ══════════════════════════════════════════
//  Supabase 공통 함수
// ══════════════════════════════════════════
async function saveDailyToDB(date, data){
  const {error:de}=await db.from('daily_records').delete().eq('work_date',date);
  if(de) throw de;
  const rows=Object.entries(data)
    .filter(([,d])=>(Number(d.qtyA)||0)>0||(Number(d.qtyB)||0)>0)
    .map(([wid,d])=>({work_date:date,worker_id:Number(wid),qty_a:Number(d.qtyA)||0,qty_b:Number(d.qtyB)||0}));
  if(rows.length>0){
    const {error:ie}=await db.from('daily_records').insert(rows);
    if(ie) throw ie;
  }
}

// ══════════════════════════════════════════
//  다이얼로그
// ══════════════════════════════════════════
function openConfirm(title,msg,btnLabel,action){
  document.getElementById('dlg-title').textContent=title;
  document.getElementById('dlg-msg').textContent=msg;
  document.getElementById('dlg-ok').textContent=btnLabel;
  confirmAction=action;
  document.getElementById('confirm-overlay').classList.add('show');
}
function closeConfirm(){ document.getElementById('confirm-overlay').classList.remove('show'); confirmAction=null; }
function doConfirm(){ if(confirmAction) confirmAction(); closeConfirm(); }

// ══════════════════════════════════════════
//  백업 / 복사
// ══════════════════════════════════════════
function openBackup(){
  document.getElementById('backup-sub').textContent=`배달원 ${workers.length}명 · 기록 ${dailyRecords.length}일 (서버 저장)`;
  document.getElementById('backup-sheet').classList.add('show');
}
function exportData(){
  const blob=new Blob([JSON.stringify({version:'mgr-v3',exportDate:new Date().toISOString(),workers,dailyRecords},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=`배송관리_백업_${today()}.json`; a.click();
  URL.revokeObjectURL(url);
  document.getElementById('backup-sheet').classList.remove('show');
  showToast('📤 백업 완료!');
}
async function importData(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=async function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      showToast('📥 복원 중...');
      const existIds=new Set(workers.map(x=>x.id));
      for(const w of (data.workers||[])){
        if(!existIds.has(w.id)){
          const {data:d,error}=await db.from('workers').insert({name:w.name,price_a:w.priceA,price_b:w.priceB}).select().single();
          if(!error) workers.push({id:d.id,name:w.name,priceA:w.priceA,priceB:w.priceB,loginId:''});
        }
      }
      const existDates=new Set(dailyRecords.map(x=>x.date));
      let n=0;
      for(const r of (data.dailyRecords||[])){
        if(!existDates.has(r.date)){ await saveDailyToDB(r.date,r.data); dailyRecords.unshift({date:r.date,data:r.data}); n++; }
      }
      dailyRecords.sort((a,b)=>b.date.localeCompare(a.date));
      document.getElementById('backup-sheet').classList.remove('show');
      updateSummary(); render();
      showToast(`✅ 복원 완료! ${n}일`);
    }catch(err){ showToast('❌ 복원 실패: '+err.message); }
  };
  reader.readAsText(file); e.target.value='';
}
function exportCSV(){
  if(!dailyRecords.length||!workers.length){ showToast('⚠️ 내보낼 기록이 없어요'); return; }
  const months={};
  dailyRecords.forEach(r=>{
    const ym=r.date.slice(0,7);
    if(!months[ym]) months[ym]={};
    Object.entries(r.data||{}).forEach(([wid,d])=>{
      const w=workers.find(x=>x.id===Number(wid)); if(!w) return;
      const p=calcPay(w,d.qtyA,d.qtyB);
      if(!months[ym][w.id]) months[ym][w.id]={name:w.name,qtyA:0,qtyB:0,gross:0,net:0,days:0};
      months[ym][w.id].qtyA+=p.a; months[ym][w.id].qtyB+=p.b;
      months[ym][w.id].gross+=p.gross; months[ym][w.id].net+=p.net; months[ym][w.id].days++;
    });
  });
  const rows=['월,이름,물품A건수,물품B건수,총건수,총금액,실수령,세금공제,배송일수'];
  Object.keys(months).sort().forEach(ym=>{
    Object.values(months[ym]).forEach(t=>{
      rows.push(`${ym},${t.name},${t.qtyA},${t.qtyB},${t.qtyA+t.qtyB},${t.gross},${t.net},${t.gross-t.net},${t.days}`);
    });
  });
  const blob=new Blob(['\uFEFF'+rows.join('\n')],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=`배송정산_${today()}.csv`; a.click();
  URL.revokeObjectURL(url);
  document.getElementById('backup-sheet').classList.remove('show');
  showToast('📊 CSV 내보내기 완료!');
}
function askReset(){
  document.getElementById('backup-sheet').classList.remove('show');
  openConfirm('⚠️ 전체 초기화',`배달원 ${workers.length}명 · 기록 ${dailyRecords.length}일\n서버에서 모두 삭제됩니다.`,'초기화',async()=>{
    try{
      await db.from('daily_records').delete().neq('id',0);
      await db.from('workers').delete().neq('id',0);
      workers=[]; dailyRecords=[];
      updateSummary(); render(); showToast('🗑 초기화 완료');
    }catch(e){ showToast('❌ '+e.message); }
  });
}
function copyCode(){
  const openEls=document.querySelectorAll('.bsoverlay.show');
  openEls.forEach(el=>el.classList.remove('show'));
  const code=document.documentElement.outerHTML;
  openEls.forEach(el=>el.classList.add('show'));
  navigator.clipboard.writeText(code).then(()=>{
    document.getElementById('backup-sheet').classList.remove('show');
    showToast('📋 전체 코드 복사 완료!');
  }).catch(()=>{
    const ta=document.createElement('textarea'); ta.value=code; ta.style.cssText='position:fixed;opacity:0';
    document.body.appendChild(ta); ta.select();
    try{ document.execCommand('copy'); showToast('📋 전체 코드 복사 완료!'); }
    catch(e){ showToast('❌ 복사 실패'); }
    document.body.removeChild(ta);
    document.getElementById('backup-sheet').classList.remove('show');
  });
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}
