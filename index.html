<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<title>📊 배송 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
--bg:#0d0f1a;--card:#16192b;--card2:#10121e;--border:#262a45;
--text:#e8eaf6;--sub:#6b729c;--sub2:#454b73;
--accent:#6c63ff;--accent2:#8b83ff;--accent3:#b8b5ff;
--green:#00d4aa;--green2:#00f5c4;
--orange:#ff9800;--orange2:#ffb74d;
--red:#ff4757;--teal:#00bcd4;--teal2:#5eead4;
--blue:#3b82f6; --blue2:#60a5fa;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;height:-webkit-fill-available}

/* ── 로그인 ── */
.login-wrap{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.login-wrap.hide{display:none}
.login-logo{font-size:52px;margin-bottom:10px}
.login-title{font-size:26px;font-weight:900;color:#fff;margin-bottom:4px}
.login-sub{font-size:11px;color:var(--sub);margin-bottom:32px;letter-spacing:2px}
.login-card{width:100%;max-width:340px;background:var(--card);border-radius:20px;padding:26px;border:1px solid var(--border)}
.lf{margin-bottom:14px}
.lf label{display:block;font-size:10px;color:var(--sub);font-weight:700;letter-spacing:0.5px;margin-bottom:6px}
.lf input{width:100%;background:var(--card2);border:1.5px solid var(--border);border-radius:12px;padding:13px 16px;font-size:16px;color:var(--text);outline:none;font-family:inherit;-webkit-appearance:none;transition:border 0.2s}
.lf input:focus{border-color:var(--accent)}
.btn-login{width:100%;padding:15px;border:none;border-radius:14px;font-size:16px;font-weight:900;cursor:pointer;font-family:inherit;background:linear-gradient(135deg,var(--accent),#8b83ff);color:#fff;box-shadow:0 4px 20px rgba(108,99,255,0.4);margin-top:8px;transition:transform 0.1s}
.btn-login:active{transform:scale(0.97)}
.login-err{font-size:12px;color:var(--red);text-align:center;margin-top:12px;font-weight:700;min-height:18px}

/* ── 공통 헤더 ── */
.header{padding:46px 18px 14px;flex-shrink:0;position:relative;overflow:hidden;border-bottom:1px solid var(--border)}
.header.admin-mode{background:linear-gradient(135deg,#1a1a3e 0%,#0d0f2a 100%)}
.header.worker-mode{background:linear-gradient(135deg,#0a1f1a 0%,#051510 100%)}
.header::before{content:'absolute';top:-40px;right:-30px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(108,99,255,0.12) 0%,transparent 70%)}
.header-row{display:flex;align-items:flex-end;justify-content:space-between;position:relative;z-index:1}
.header-label{font-size:10px;letter-spacing:3px;margin-bottom:3px;font-weight:500}
.admin-mode .header-label{color:var(--accent3)}
.worker-mode .header-label{color:var(--teal2)}
.header-title{font-size:22px;font-weight:900;color:#fff}
.header-date{font-size:10px;color:var(--sub);margin-top:2px}
.header-actions{display:flex;gap:8px;align-items:flex-end}
.hbtn{border-radius:12px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;transition:all 0.15s;border:none}
.admin-mode .hbtn{background:rgba(108,99,255,0.15);border:1.5px solid rgba(108,99,255,0.3)}
.worker-mode .hbtn{background:rgba(0,212,170,0.15);border:1.5px solid rgba(0,212,170,0.3)}
.hbtn:active{transform:scale(0.91)}
.logout-btn{font-size:11px;padding:6px 10px;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:700;border:none}
.admin-mode .logout-btn{background:rgba(108,99,255,0.1);color:var(--accent3)}
.worker-mode .logout-btn{background:rgba(0,212,170,0.1);color:var(--teal2)}

/* ── 요약바 & 탭 ── */
.summary-bar{display:grid;gap:6px;padding:10px 14px;flex-shrink:0;background:var(--card2);border-bottom:1px solid var(--border)}
.summary-bar.cols3{grid-template-columns:repeat(3,1fr)}
.sum-item{text-align:center;padding:9px 4px;background:var(--card);border-radius:10px;border-top:2px solid var(--accent)}
.sum-item.g{border-top-color:var(--green)}
.sum-item.t{border-top-color:var(--teal)}
.sum-item.o{border-top-color:var(--orange)}
.sum-val{font-size:14px;font-weight:900;color:var(--accent3);line-height:1.2}
.sum-item.g .sum-val{color:var(--green2)}
.sum-item.t .sum-val{color:var(--teal2)}
.sum-item.o .sum-val{color:var(--orange2)}
.sum-lbl{font-size:9px;color:var(--sub);margin-top:3px}

.tabs{display:flex;padding:10px 14px 0;gap:4px;flex-shrink:0;background:var(--card2);overflow-x:auto;}
.tab{flex:1;min-width:65px;padding:10px 0;border:none;font-size:11px;font-weight:700;cursor:pointer;transition:all 0.2s;font-family:inherit;border-radius:10px 10px 0 0;border-bottom:2px solid transparent;white-space:nowrap}
.tab.active.admin{background:var(--card);color:var(--accent2);border-bottom-color:var(--accent)}
.tab.active.worker{background:var(--card);color:var(--teal2);border-bottom-color:var(--teal)}
.tab:not(.active){background:transparent;color:var(--sub)}

/* ── 콘텐츠 영역 ── */
.content{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch;background:var(--card2)}

/* ── 폼 버튼 공통 ── */
.field{margin-bottom:12px}
.field label{display:block;font-size:10px;color:var(--sub);font-weight:700;letter-spacing:0.5px;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:11px 13px;font-size:15px;color:var(--text);outline:none;font-family:inherit;-webkit-appearance:none;transition:border 0.2s}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent)}
.btn-primary{width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:900;cursor:pointer;font-family:inherit;background:linear-gradient(135deg,var(--accent),#8b83ff);color:#fff;box-shadow:0 4px 20px rgba(108,99,255,0.3);transition:transform 0.1s;margin-bottom:10px}
.btn-primary.green{background:linear-gradient(135deg,#00a882,#00d4aa);box-shadow:0 4px 20px rgba(0,212,170,0.3);color:#001a14}
.btn-primary.teal{background:linear-gradient(135deg,#007a6a,#00bcd4);box-shadow:0 4px 20px rgba(0,188,212,0.3);color:#001a14}
.btn-primary.orange{background:linear-gradient(135deg,var(--orange),var(--orange2));box-shadow:0 4px 20px rgba(255,152,0,0.3);color:#1a0f00}
.btn-primary:active{transform:scale(0.97)}
.btn-secondary{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:12px;font-size:13px;color:var(--sub);background:transparent;cursor:pointer;font-family:inherit;margin-bottom:8px}

/* ── 배달원 카드 ── */
.worker-card{background:var(--card);border-radius:14px;padding:14px;margin-bottom:10px;border-left:4px solid var(--accent);display:flex;align-items:center;gap:12px}
.worker-avatar{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;flex-shrink:0}
.worker-avatar.admin-av{background:linear-gradient(135deg,var(--accent),#8b83ff)}
.worker-avatar.worker-av{background:linear-gradient(135deg,var(--teal),var(--teal2))}
.worker-info{flex:1;min-width:0}
.worker-name{font-size:15px;font-weight:900}
.worker-prices{font-size:11px;color:var(--sub);margin-top:3px;line-height:1.4}
.worker-btns{display:flex;gap:6px;flex-shrink:0;flex-direction:column}
.wbtn{padding:7px 10px;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;width:34px;height:30px;display:flex;align-items:center;justify-content:center}
.wbtn-edit{background:rgba(108,99,255,0.15);color:var(--accent2)}
.wbtn-del{background:rgba(255,71,87,0.12);color:var(--red)}

/* ── 일별 입력 공통 ── */
.date-nav{display:flex;align-items:center;justify-content:space-between;background:var(--card);border-radius:12px;padding:10px 14px;margin-bottom:14px;border:1.5px solid var(--border)}
.date-nav-btn{background:transparent;border:none;color:var(--sub);font-size:20px;cursor:pointer;padding:2px 8px;line-height:1}
.date-nav-label{font-size:14px;font-weight:900;color:var(--text)}
.date-nav-sub{font-size:10px;color:var(--sub);text-align:center;margin-top:2px}
.daily-worker-row{background:var(--card);border-radius:14px;padding:13px 14px;margin-bottom:8px;border:1.5px solid var(--border);transition:border-color 0.2s}
.daily-worker-row.has-data{border-color:rgba(108,99,255,0.4)}
.daily-row-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.daily-avatar{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent),#8b83ff);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff;flex-shrink:0}
.daily-name{font-size:14px;font-weight:700;flex:1}
.daily-total-badge{font-size:12px;font-weight:900;color:var(--green2);background:rgba(0,212,170,0.1);padding:3px 9px;border-radius:20px}
.daily-inputs{display:grid;grid-template-columns:repeat(3, 1fr);gap:6px}
.daily-field label{display:block;font-size:9px;color:var(--sub);font-weight:700;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.daily-field input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:9px;padding:10px 4px;font-size:20px;font-weight:900;color:var(--text);text-align:center;outline:none;font-family:inherit;-webkit-appearance:none;transition:border 0.2s}
.daily-field input:focus{border-color:var(--accent);background:var(--card2)}
.daily-field-sub{font-size:9px;color:var(--sub);text-align:center;margin-top:4px;min-height:14px;white-space:nowrap}

/* ── 배달원 오늘 입력 ── */
.my-input-header{background:linear-gradient(135deg,rgba(0,188,212,0.12),rgba(0,188,212,0.04));border:1.5px solid rgba(0,188,212,0.2);border-radius:14px;padding:16px;margin-bottom:14px}
.my-input-name{font-size:18px;font-weight:900;color:var(--teal2);margin-bottom:4px}
.my-input-sub{font-size:11px;color:var(--sub)}
.my-qty-grid{display:grid;grid-template-columns:repeat(3, 1fr);gap:8px;margin-bottom:14px}
.my-qty-box{background:var(--card);border-radius:14px;padding:14px 8px;border:1.5px solid var(--border);text-align:center}
.my-qty-label{font-size:10px;font-weight:700;margin-bottom:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.my-qty-label.a{color:var(--orange2)}
.my-qty-label.b{color:var(--accent2)}
.my-qty-label.c{color:var(--pink2)}
.my-qty-input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:14px 4px;font-size:26px;font-weight:900;color:var(--text);text-align:center;outline:none;font-family:inherit;-webkit-appearance:none;transition:border 0.2s}
.my-qty-input:focus{border-color:var(--teal)}
.my-calc-box{background:linear-gradient(135deg,#0a1f1a,#061410);border:1.5px solid rgba(0,188,212,0.2);border-radius:14px;padding:14px;margin-bottom:14px}
.my-calc-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:12px}
.my-calc-lbl{color:var(--sub)}
.my-calc-val{font-weight:700}
.my-calc-sep{border:none;border-top:1px solid rgba(0,188,212,0.15);margin:8px 0}
.my-calc-total{font-size:22px;font-weight:900;color:var(--teal2)}

/* ── 기록 및 정산 ── */
.rec-day-card{background:var(--card);border-radius:14px;padding:14px;margin-bottom:10px;border:1.5px solid var(--border)}
.rec-day-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.rec-day-date{font-size:15px;font-weight:900}
.rec-day-total{font-size:13px;font-weight:900;color:var(--green2)}
.rec-worker-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg);border-radius:9px;margin-bottom:4px}
.rec-worker-name{font-size:12px;font-weight:700;flex:1}
.rec-worker-qty{font-size:10px;color:var(--sub);margin-right:6px;text-align:right}
.rec-worker-pay{font-size:13px;font-weight:900;color:var(--accent3)}
.rec-btns{display:flex;gap:6px;margin-top:10px}
.rec-btn{flex:1;padding:8px;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.rec-btn-edit{background:rgba(108,99,255,0.15);color:var(--accent2)}
.rec-btn-del{background:rgba(255,71,87,0.12);color:var(--red)}
.my-rec-card{background:var(--card);border-radius:14px;padding:14px;margin-bottom:8px;border-left:4px solid var(--teal)}
.my-rec-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.my-rec-date{font-size:14px;font-weight:900;color:var(--teal2)}
.my-rec-pay{font-size:15px;font-weight:900;color:var(--green2)}
.period-tabs{display:flex;gap:6px;margin-bottom:12px}
.period-tab{flex:1;padding:9px 0;border:1.5px solid var(--border);border-radius:10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;background:transparent;color:var(--sub);transition:all 0.2s}
.period-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.period-tab.active.worker-tab{background:var(--teal);border-color:var(--teal);color:#001a14}
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.month-nav-btn{background:var(--card);border:1.5px solid var(--border);border-radius:10px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;color:var(--sub)}
.month-nav-title{font-size:16px;font-weight:900}
.stat-summary{background:linear-gradient(135deg,#131625,#0f1120);border:1.5px solid rgba(108,99,255,0.25);border-radius:14px;padding:16px;margin-bottom:12px}
.stat-summary.worker-stat{background:linear-gradient(135deg,#0a1f1a,#061410);border-color:rgba(0,188,212,0.25)}
.stat-title{font-size:10px;letter-spacing:0.5px;margin-bottom:12px;font-weight:700}
.stat-title.admin{color:var(--accent3)}
.stat-title.worker{color:var(--teal2)}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:12px}
.stat-row-lbl{color:var(--sub)}
.stat-row-val{font-weight:700}
.stat-sep{border:none;border-top:1px solid var(--border);margin:8px 0}
.stat-total{font-size:22px;font-weight:900;color:var(--green2);margin-top:4px}
.worker-stat-card{background:var(--card);border-radius:14px;padding:13px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer}
.wsc-rank{font-size:22px;font-weight:900;color:var(--sub2);width:28px;text-align:center;flex-shrink:0}
.wsc-avatar{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#8b83ff);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:#fff;flex-shrink:0}
.wsc-info{flex:1;min-width:0}
.wsc-name{font-size:14px;font-weight:900}
.wsc-pay{text-align:right}
.wsc-gross{font-size:15px;font-weight:900;color:var(--accent3)}
.wsc-net{font-size:11px;color:var(--green2);margin-top:2px}
.wsc-qty{font-size:10px;color:var(--sub);margin-top:1px}
.back-btn{display:flex;align-items:center;gap:6px;background:var(--card);border:1.5px solid var(--border);border-radius:10px;padding:9px 14px;font-size:13px;font-weight:700;color:var(--sub);cursor:pointer;margin-bottom:14px;font-family:inherit}
.detail-header{background:linear-gradient(135deg,rgba(108,99,255,0.15),rgba(108,99,255,0.05));border:1.5px solid rgba(108,99,255,0.2);border-radius:14px;padding:16px;margin-bottom:12px}
.detail-day-row{background:var(--card);border-radius:10px;padding:11px 13px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.ddr-date{font-size:12px;font-weight:700;flex:1}
.ddr-pay{font-size:13px;font-weight:900;color:var(--accent3)}
.ddr-net{font-size:10px;color:var(--green2);text-align:right}

/* ── 🌟 새로운 출입코드 UI (이미지 스타일 완벽 적용!) ── */
.ws-wrap { position: relative; margin-bottom: 16px; }
.ws-select { width: 100%; appearance: none; background: var(--card); border: 1.5px solid var(--border); border-radius: 16px;
padding: 15px 48px 15px 18px; font-size: 15px; font-weight: 900; color: var(--accent3); cursor: pointer; outline: none; transition: all 0.2s; font-family: inherit;}
.ws-select:focus { border-color: var(--accent); }
.ws-icon { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); pointer-events: none; color: var(--sub); font-size: 12px; }

.cn-wrap { padding-bottom: 20px; }
.cn-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.cn-title-area { display: flex; align-items: center; gap: 10px; }
.cn-key-icon { background: var(--orange); color: #1a0f00; width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
.cn-title { font-size: 18px; font-weight: 900; color: var(--text); line-height: 1.2; }
.cn-title-sub { font-size: 11px; color: var(--sub); margin-top: 3px; letter-spacing: -0.3px; }
.cn-top-btns { display: flex; gap: 8px; }
.cn-btn-icon { background: var(--card2); border: 1.5px solid var(--border); color: var(--text); border-radius: 12px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; font-size: 16px; cursor: pointer; }
.cn-btn-add { background: var(--orange); border: none; color: #1a0f00; font-weight: 900; font-size: 13px; padding: 0 16px; border-radius: 12px; cursor: pointer; }

.cn-search { width: 100%; padding: 14px 16px 14px 44px; background: var(--card) url('data:image/svg+xml;utf8,<svg fill="%236b729c" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>') no-repeat 16px center/20px;
border: 1.5px solid var(--border); border-radius: 16px; color: var(--text); font-size: 14px; outline: none; margin-bottom: 16px; font-family: inherit; }

.code-drag-handle { font-size: 18px; color: var(--sub2); padding: 0 8px; cursor: grab; display: flex; align-items: center; justify-content: center; touch-action: none; height: 100%; }

/* 1단계: 지역 (대그룹) */
.cn-region { background: var(--card); border-radius: 16px; margin-bottom: 12px; overflow: hidden; position: relative; }
.cn-region::before { content: ''; position: absolute; left: 0; top: 12px; bottom: 12px; width: 4px; background: var(--orange); border-radius: 0 4px 4px 0; }
.cn-region-head { display: flex; align-items: center; padding: 14px 12px 14px 4px; cursor: pointer; user-select: none; }
.cn-r-icon { background: rgba(255,152,0,0.15); color: var(--orange); width: 36px; height: 36px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; margin-right: 12px; flex-shrink: 0; }
.cn-r-info { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
.cn-r-name { font-size: 16px; font-weight: 900; color: var(--text); margin-bottom: 2px; }
.cn-r-stat { font-size: 11px; color: var(--sub); }
.cn-actions { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
.cn-circle-btn { width: 32px; height: 32px; border-radius: 50%; border: 1.5px solid var(--border); background: transparent; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; font-size: 14px; }
.cn-circle-btn.add { color: var(--orange); border-color: rgba(255,152,0,0.3); }
.cn-circle-btn.edit { color: var(--orange); }
.cn-circle-btn.del { color: var(--sub); }
.cn-arrow { color: var(--sub); margin-left: 4px; font-size: 12px; transition: transform 0.2s; width: 20px; text-align: center; }
.cn-region.open .cn-arrow { transform: rotate(180deg); color: var(--orange); }
.cn-complexes { display: none; padding: 0 12px 16px 12px; }
.cn-region.open > .cn-complexes { display: block; }

/* 2단계: 단지 (소그룹) */
.cn-complex { background: var(--bg); border-radius: 14px; margin-bottom: 8px; overflow: hidden; position: relative; }
.cn-complex::before { content: ''; position: absolute; left: 0; top: 10px; bottom: 10px; width: 3px; background: var(--blue); border-radius: 0 4px 4px 0; }
.cn-comp-head { display: flex; align-items: center; padding: 12px 10px 12px 4px; cursor: pointer; user-select: none; }
.cn-c-icon { background: rgba(59,130,246,0.15); color: var(--blue2); width: 32px; height: 32px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; margin-right: 10px; flex-shrink: 0; }
.cn-c-info { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
.cn-c-name { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
.cn-c-stat { font-size: 10px; color: var(--sub); }
.cn-circle-btn.c-add { color: var(--blue2); border-color: rgba(59,130,246,0.3); }
.cn-circle-btn.c-edit { color: var(--blue2); }
.cn-complex.open .cn-arrow { transform: rotate(180deg); color: var(--blue2); }
.cn-items { display: none; padding: 0; }
.cn-complex.open > .cn-items { display: block; }

/* 3단계: 주소/코드 (항목) */
.cn-item { display: flex; align-items: center; padding: 12px 10px 12px 4px; border-top: 1px solid var(--border); background: var(--bg); cursor: pointer; }
.cn-i-info { flex: 1; display: flex; justify-content: space-between; align-items: center; padding-left: 6px; }
.cn-i-addr { font-size: 13px; font-weight: 700; color: var(--text); }
.cn-i-code { font-size: 14px; font-weight: 900; color: var(--green2); letter-spacing: 0.5px; margin-right: 12px; }

/* ── 🚨 라디오 버튼 디자인 꼬임 완벽 해결 (!important) ── */
.radio-card input[type="radio"] { display: none !important; }
.radio-card .rc-content { display: flex; align-items: center; gap: 12px; background: var(--card2); border: 1.5px solid var(--border); border-radius: 12px; padding: 16px; cursor: pointer; transition: all 0.2s; }
.radio-card .rc-icon { font-size: 22px; filter: grayscale(1); opacity: 0.5; transition: all 0.2s; }
.radio-card .rc-title { font-size: 14px; font-weight: 900; color: var(--sub); transition: all 0.2s; margin-bottom: 2px; }
.radio-card .rc-desc { font-size: 11px; color: var(--sub); line-height: 1.3; }
.radio-card input[type="radio"]:checked + .rc-content { border-color: var(--teal); background: rgba(0, 188, 212, 0.08); }
.radio-card input[type="radio"]:checked + .rc-content .rc-icon { filter: none; opacity: 1; }
.radio-card input[type="radio"]:checked + .rc-content .rc-title { color: var(--teal2); }
.radio-card.danger input[type="radio"]:checked + .rc-content { border-color: var(--red); background: rgba(255, 71, 87, 0.08); }
.radio-card.danger input[type="radio"]:checked + .rc-content .rc-title { color: var(--red); }

/* ── 모달/시트 공통 ── */

    checkWorkerLogin(id, pw, errEl);
  }
}

async function checkWorkerLogin(id, pw, errEl) {
  errEl.textContent = '확인 중...';
  try {
    // 👇 .single() 대신에 배열로 가져옵니다. (중복 아이디가 있어도 에러 안 남!)
    const { data, error } = await db.from('workers').select('*').eq('login_id', id);
    if (error || !data || data.length === 0) throw new Error('ID_NOT_FOUND');
    
    // 만약 중복 아이디가 있다면 무조건 첫 번째 계정을 사용합니다.
    const workerData = data[0];

    // 👇 DB 비밀번호와 입력 비밀번호 모두 문자열로 바꾸고 앞뒤 공백을 제거한 뒤 비교!
    const dbPw = String(workerData.login_pw || '').trim();
    const inputPw = String(pw).trim();

    if (dbPw !== inputPw) throw new Error('WRONG_PW');

    currentUser = { id: workerData.login_id, role: 'worker', name: workerData.name, workerId: workerData.id };
    finishLogin();
  } catch(e) {
    if(e.message === 'ID_NOT_FOUND') {
      errEl.textContent='❌ 등록되지 않은 아이디입니다.';
    } else if(e.message === 'WRONG_PW') {
      errEl.textContent='❌ 비밀번호가 틀렸습니다.';
    } else {
      errEl.textContent='❌ 로그인 오류가 발생했습니다.';
    }
  }
}

async function loadAll(){
  isLoading=true; render();
  try {
    const {data:w,error:we}=await db.from('workers').select('*').order('id');
    if(we) throw we;
    
    workers=(w||[]).map(x=> {
      let codes = x.access_codes || [];
      codes.forEach(c => {
        if(c.items && !c.subs) {
          c.subs = [{ id: 's_'+Math.random().toString(36).substr(2,5), name: '기본 단지', items: c.items }];
          delete c.items;
        }
        if(!c.subs) c.subs = [];
        c.subs.forEach(s => { if(!s.items) s.items = []; });
      });

      return {
        id:x.id, name:x.name,
        priceA:x.price_a||0, priceB:x.price_b||0, priceC:x.price_c||0,
        loginId:x.login_id||'', region: x.region||'', codes: codes
      };
    });

    const {data:r,error:re}=await db.from('daily_records').select('*').order('work_date',{ascending:false});
    if(re) throw re;
    const map={};
    (r||[]).forEach(row=>{
      const d=row.work_date;
      if(!map[d]) map[d]={date:d,data:{}};
      map[d].data[row.worker_id]={qtyA:String(row.qty_a||0),qtyB:String(row.qty_b||0),qtyC:String(row.qty_c||0)};
    });
    dailyRecords=Object.values(map).sort((a,b)=>b.date.localeCompare(a.date));
  } catch(e){
    console.error(e);
    showToast('❌ 로드 실패: '+e.message);
  }
  isLoading=false;
  updateSummary();
  render();
}

function updateSummary(){
  if(!currentUser) return;
  const isAdmin = currentUser.role==='admin';
  const m = today().slice(0,7);
  if(isAdmin){
    document.getElementById('s1').textContent=workers.length+'명';
    document.getElementById('s1l').textContent='등록 배달원';
    const mRecs=dailyRecords.filter(r=>r.date.startsWith(m));
    let mTotal=0;
    mRecs.forEach(r=>Object.keys(r.data||{}).forEach(wid=>{
      const w=workers.find(x=>x.id===Number(wid));
      if(w) mTotal+=calcPay(w,r.data[wid].qtyA,r.data[wid].qtyB,r.data[wid].qtyC).gross;
    }));
    document.getElementById('s2').textContent=wonShort(mTotal);
    document.getElementById('s2l').textContent='이번 달 총액';
    const tRec=dailyRecords.find(r=>r.date===today());
    let tQty=0;
    if(tRec) Object.values(tRec.data||{}).forEach(d=>{tQty+=(Number(d.qtyA)||0)+(Number(d.qtyB)||0)+(Number(d.qtyC)||0);});
    document.getElementById('s3').textContent=tQty.toLocaleString()+'건';
    document.getElementById('s3l').textContent='오늘 총 배송';
  } else {
    const w=workers.find(x=>x.id===currentUser.workerId);
    const mRecs=dailyRecords.filter(r=>r.date.startsWith(m)&&r.data?.[currentUser.workerId]);
    const mQty=mRecs.reduce((s,r)=>s+(Number(r.data[currentUser.workerId]?.qtyA)||0)+(Number(r.data[currentUser.workerId]?.qtyB)||0)+(Number(r.data[currentUser.workerId]?.qtyC)||0),0);
    const tRec=dailyRecords.find(r=>r.date===today());
    const tD=tRec?.data?.[currentUser.workerId];
    const tQty=tD?(Number(tD.qtyA)||0)+(Number(tD.qtyB)||0)+(Number(tD.qtyC)||0):0;
    document.getElementById('s1').textContent=mRecs.length+'일';
    document.getElementById('s1l').textContent='이번 달 배송일';
    document.getElementById('s2').textContent=mQty.toLocaleString()+'건';
    document.getElementById('s2l').textContent='이번 달 배송량';
    document.getElementById('s3').textContent=tQty.toLocaleString()+'건';
    document.getElementById('s3l').textContent='오늘 배송량';
  }
}

function switchTab(t){

    const el=document.getElementById('tab-'+x);
    if(el) el.className='tab'+(x===t?' active admin':'');
  });
  render();
}
function switchMyTab(t){
  myTab=t;
  ['my-input','my-records','my-stats', 'my-codes'].forEach(x=>{
    const el=document.getElementById('tab-'+x);
    if(el) el.className='tab'+(x.replace('my-','')===(t)?(' active worker'):'');
  });
  render();
}

function render(){
  const c=document.getElementById('content');
  if(!currentUser){ c.innerHTML=''; return; }
  if(isLoading){ c.innerHTML=`<div class="loading"><div class="spinner"></div><div class="loading-txt">데이터 불러오는 중...</div></div>`; return; }

  if(currentUser.role==='admin'){
    if(tab==='daily') c.innerHTML=renderAdminDaily();
    else if(tab==='records') c.innerHTML=renderAdminRecords();
    else if(tab==='stats') c.innerHTML=detailWorkerId?renderWorkerDetail():renderAdminStats();
    else if(tab==='workers') c.innerHTML=renderAdminWorkers();
    else if(tab==='codes') c.innerHTML=renderAdminCodes();
    
    if(tab==='daily') bindAdminDailyEvents();
    if(tab==='codes') { bindCodeSearchEvent(); initSortableCodes(); } 
  } else {
    if(myTab==='input') c.innerHTML=renderMyInput();
    else if(myTab==='records') c.innerHTML=renderMyRecords();
    else if(myTab==='stats') c.innerHTML=renderMyStats();
    else if(myTab==='codes') c.innerHTML=renderMyCodes();
    
    if(myTab==='input') bindMyInputEvents();
    if(myTab==='codes') { bindCodeSearchEvent(); initSortableCodes(); }
  }
}

async function saveWorker(){
  const name=document.getElementById('ws-name').value.trim();
  const region=document.getElementById('ws-region').value.trim();
  const loginId=document.getElementById('ws-id').value.trim();
  const pw=document.getElementById('ws-pw').value.trim();
  const pa=Number(document.getElementById('ws-pa').value)||0;
  const pb=Number(document.getElementById('ws-pb').value)||0;
  const pc=Number(document.getElementById('ws-pc').value)||0;

  if(!name){ showToast('⚠️ 이름을 입력해주세요'); return; }
  try {
    if(editWorkerId){
      const upd={name, region, price_a:pa, price_b:pb, price_c:pc};
      if(loginId) upd.login_id=loginId;
      if(pw) upd.login_pw=pw;
      const {error}=await db.from('workers').update(upd).eq('id',editWorkerId);
      if(error) throw error;
      workers=workers.map(w=>w.id===editWorkerId?{...w,name,region,priceA:pa,priceB:pb,priceC:pc,loginId:loginId||w.loginId}:w);
      showToast('✅ 수정 완료');
    } else {
      const ins={name, region, price_a:pa, price_b:pb, price_c:pc};
      if(loginId) ins.login_id=loginId;
      if(pw) ins.login_pw=pw;
      const {data,error}=await db.from('workers').insert(ins).select().single();
      if(error) throw error;
      workers.push({id:data.id,name,region,priceA:pa,priceB:pb,priceC:pc,loginId:loginId||'', codes:[]});
      showToast('✅ 배달원 추가 완료');
    }
    closeWorkerSheet(); updateSummary(); render();
  } catch(e){ showToast('❌ 저장 실패: '+e.message); }
}

function askDeleteWorker(id){
  const w=workers.find(x=>x.id===id);
  openConfirm('🗑 배달원 삭제',`${w?.name}님을 삭제할까요?`,'삭제',async()=>{
    try{
      await db.from('workers').delete().eq('id',id);
      workers=workers.filter(x=>x.id!==id);
      updateSummary(); render(); showToast('🗑 삭제됨');
    }catch(e){ showToast('❌ '+e.message); }
  });
}

        let mItems = (s.items || []).filter(i => (i.addr||'').toLowerCase().includes(q) || (i.code||'').toLowerCase().includes(q));

          ${(f.subs||[]).length === 0 ? `<div style="padding:16px;text-align:center;font-size:11px;color:var(--sub)">단지가 없습니다. [+] 버튼을 눌러 단지를 추가하세요.</div>` : ''}
        </div>
      </div>
      `}).join('');
    html += `</div>`;
  }
  
  html += `</div>`;
  return html;
}

async function syncCodesToDB(workerId, newCodes) {
  showToast('저장 중...');
  if (workerId === 'admin') {
    localStorage.setItem('mgr-admin-codes', JSON.stringify(newCodes));
    showToast('✅ 관리자 노트에 저장 완료');
    render(); return;
  }
  try {
    const {error} = await db.from('workers').update({access_codes: newCodes}).eq('id', workerId);
    if(error) throw error;
    const w = workers.find(x => x.id == workerId);
    if(w) w.codes = newCodes;
    showToast('✅ 처리 완료'); render();
  } catch(e) { showToast('❌ 오류: ' + e.message); }
}

        if(subA) subA.textContent=qA?won(Number(qA)*(w.priceA||0)):'';

        const row=document.getElementById(`dwr-${w.id}`);

function changeAdminDate(dir){
  const [y, m, d] = adminInputDate.split('-').map(Number);
  const dateObj = new Date(y, m - 1, d + dir);
  const yy = dateObj.getFullYear();
  const mm = String(dateObj.getMonth() + 1).padStart(2, '0');
  const dd = String(dateObj.getDate()).padStart(2, '0');
  adminInputDate = `${yy}-${mm}-${dd}`;
  adminInputData={}; render();
}

async function saveAdminDaily(){
  const data={};
  workers.forEach(w=>{
    const qa=document.getElementById(`qa-${w.id}`)?.value||'';
    const qb=document.getElementById(`qb-${w.id}`)?.value||'';
    const qc=document.getElementById(`qc-${w.id}`)?.value||'';
    if(qa||qb||qc) data[w.id]={qtyA:qa,qtyB:qb,qtyC:qc};
  });
  if(!Object.keys(data).length){ showToast('⚠️ 수량을 입력해주세요'); return; }
  showToast('💾 저장 중...');
  try {
    await saveDailyToDB(adminInputDate,data);
    const idx=dailyRecords.findIndex(r=>r.date===adminInputDate);
    if(idx>=0) dailyRecords[idx].data=data;
    else dailyRecords.unshift({date:adminInputDate,data});
    dailyRecords.sort((a,b)=>b.date.localeCompare(a.date));
    adminInputData={}; updateSummary();
    showToast('✅ 저장 완료!'); switchTab('records');
  } catch(e){ showToast('❌ 저장 실패: '+e.message); }
}

  if(!filtered.length) return pBar+navHtml+`<div class="empty" style="padding:40px 0">해당 기간에 기록이 없어요</div>`;
  const totals={};
  workers.forEach(w=>{ totals[w.id]={w,qty:0,qtyA:0,qtyB:0,qtyC:0,gross:0,net:0,days:0}; });
  let gGross=0,gNet=0,gQty=0;
  filtered.forEach(r=>{

    <div class="my-input-sub">오늘의 배송 수량을 입력해주세요</div>
  </div>
  <div class="date-nav" style="margin-bottom:14px">
    <button class="date-nav-btn" onclick="myQtyA='';myQtyB='';myQtyC='';changeMyDate(-1)">◀</button>
    <div style="text-align:center">
      <div class="date-nav-label">${fmtDate(myInputDate)} (${dow})</div>
      <div class="date-nav-sub">${rec?.data?.[w.id]?'✏️ 기존 기록':'새 기록'}</div>
    </div>
    <button class="date-nav-btn" onclick="myQtyA='';myQtyB='';myQtyC='';changeMyDate(1)">▶</button>
  </div>
  <div class="my-qty-grid">
    <div class="my-qty-box">
      <div class="my-qty-label a">🅰 ${itemNames.a}</div>
      <input class="my-qty-input" type="number" id="my-qa" value="${qa}" placeholder="0" inputmode="numeric" min="0">
    </div>
    <div class="my-qty-box">
      <div class="my-qty-label b">🅱 ${itemNames.b}</div>
      <input class="my-qty-input" type="number" id="my-qb" value="${qb}" placeholder="0" inputmode="numeric" min="0">
    </div>
    <div class="my-qty-box">
      <div class="my-qty-label c">🅲 ${itemNames.c}</div>
      <input class="my-qty-input" type="number" id="my-qc" value="${qc}" placeholder="0" inputmode="numeric" min="0">
    </div>
  </div>
  ${p.qty>0?`<div class="my-calc-box">
    <div class="my-calc-row"><span class="my-calc-lbl">📦 총 배송</span><span class="my-calc-val">${p.qty.toLocaleString()}건</span></div>
    <hr class="my-calc-sep">
    <div style="font-size:10px;color:var(--sub);margin-bottom:4px">예상 수령액</div>
    <div class="my-calc-total">${won(p.gross)}</div>
    <div style="font-size:11px;color:var(--teal2);margin-top:4px">실수령 (3.3% 공제): ${won(p.net)}</div>
  </div>`:''}
  <button class="btn-primary teal" onclick="saveMyRecord()">💾 저장하기</button>
  <div style="height:20px"></div>`;
}

function bindMyInputEvents(){
  const w=workers.find(x=>x.id===currentUser.workerId); if(!w) return;
  const updateCalc = () => {
    myQtyA=document.getElementById('my-qa')?.value||'';
    myQtyB=document.getElementById('my-qb')?.value||'';
    myQtyC=document.getElementById('my-qc')?.value||'';
    const p=calcPay(w,myQtyA,myQtyB,myQtyC);
    refreshMyCalc(p);
  };
  document.getElementById('my-qa')?.addEventListener('input', updateCalc);
  document.getElementById('my-qb')?.addEventListener('input', updateCalc);
  document.getElementById('my-qc')?.addEventListener('input', updateCalc);
}

function refreshMyCalc(p){
  const box=document.querySelector('.my-calc-box');
  if(p.qty>0){
    if(box){
      box.querySelector('.my-calc-total').textContent=won(p.gross);
      const rows=box.querySelectorAll('.my-calc-val');
      if(rows[0]) rows[0].textContent=p.qty.toLocaleString()+'건';
      box.querySelector('[style*="teal2"]').textContent=`실수령 (3.3% 공제): ${won(p.net)}`;
    } else {
      const btn=document.querySelector('.btn-primary.teal');
      if(btn){
        const div=document.createElement('div');
        div.className='my-calc-box';
        div.innerHTML=`<div class="my-calc-row"><span class="my-calc-lbl">📦 총 배송</span><span class="my-calc-val">${p.qty.toLocaleString()}건</span></div>
        <hr class="my-calc-sep">
        <div style="font-size:10px;color:var(--sub);margin-bottom:4px">예상 수령액</div>
        <div class="my-calc-total">${won(p.gross)}</div>
        <div style="font-size:11px;color:var(--teal2);margin-top:4px">실수령 (3.3% 공제): ${won(p.net)}</div>`;
        btn.before(div);
      }
    }
  } else if(box) box.remove();
}

function changeMyDate(dir){
  const [y, m, d] = myInputDate.split('-').map(Number);
  const dateObj = new Date(y, m - 1, d + dir);
  const yy = dateObj.getFullYear();
  const mm = String(dateObj.getMonth() + 1).padStart(2, '0');
  const dd = String(dateObj.getDate()).padStart(2, '0');
  myInputDate = `${yy}-${mm}-${dd}`;
  render();
}

async function saveMyRecord(){
  const w=workers.find(x=>x.id===currentUser.workerId); if(!w) return;
  const qa=document.getElementById('my-qa')?.value||myQtyA||'';
  const qb=document.getElementById('my-qb')?.value||myQtyB||'';
  const qc=document.getElementById('my-qc')?.value||myQtyC||'';
  if(!qa&&!qb&&!qc){ showToast('⚠️ 수량을 입력해주세요'); return; }
  showToast('💾 저장 중...');
  try {
    const {error}=await db.from('daily_records').upsert({
      work_date:myInputDate, worker_id:w.id,
      qty_a:Number(qa)||0, qty_b:Number(qb)||0, qty_c:Number(qc)||0
    },{onConflict:'work_date,worker_id'});
    if(error) throw error;
    
    const idx=dailyRecords.findIndex(r=>r.date===myInputDate);
    const entry={qtyA:qa,qtyB:qb,qtyC:qc};
    if(idx>=0){ dailyRecords[idx].data[w.id]=entry; }
    else { dailyRecords.unshift({date:myInputDate,data:{[w.id]:entry}}); }
    dailyRecords.sort((a,b)=>b.date.localeCompare(a.date));

    myQtyA=''; myQtyB=''; myQtyC='';
    updateSummary();
    showToast('✅ 저장 완료!');
    switchMyTab('records');
  } catch(e){ showToast('❌ 저장 실패: '+e.message); }
}

function renderMyRecords(){
  const w=workers.find(x=>x.id===currentUser.workerId);
  if(!w) return `<div class="empty">배달원 정보 없음</div>`;
  const myRecs=dailyRecords.filter(r=>r.data?.[w.id]);
  if(!myRecs.length) return `<div class="empty">📋 아직 기록이 없어요</div>`;
  return myRecs.map(r=>{
    const p=calcPay(w,r.data[w.id].qtyA,r.data[w.id].qtyB,r.data[w.id].qtyC);
    return `<div class="my-rec-card">
      <div class="my-rec-head">
        <div class="my-rec-date">${fmtDate(r.date)} <span style="font-size:11px;color:var(--sub)">${fmtDay(r.date)}</span></div>
        <div class="my-rec-pay">${won(p.gross)}</div>
      </div>
      <div class="my-rec-detail">🅰 ${p.a} · 🅱 ${p.b} · 🅲 ${p.c} · 합계 ${p.qty}건 · 실수령 ${won(p.net)}</div>
    </div>`;
  }).join('')+'<div style="height:20px"></div>';
}

function renderMyStats(){
  const w=workers.find(x=>x.id===currentUser.workerId);
  if(!w) return `<div class="empty">배달원 정보 없음</div>`;
  const pBar=`<div class="period-tabs">
    <button class="period-tab ${myStatPeriod==='month'?'active worker-tab':''}" onclick="myStatPeriod='month';render()">🗓 이번 달</button>
    <button class="period-tab ${myStatPeriod==='all'?'active worker-tab':''}" onclick="myStatPeriod='all';render()">📊 전체</button>
  </div>`;
  let filtered=[], navHtml='', title='';
  if(myStatPeriod==='month'){
    const ym=`${myStatYear}-${String(myStatMonth+1).padStart(2,'0')}`;
    filtered=dailyRecords.filter(r=>r.date.startsWith(ym)&&r.data?.[w.id]);
    title=`${myStatYear}년 ${myStatMonth+1}월`;
    navHtml=`<div class="month-nav">
      <div class="month-nav-btn" onclick="myStatMonth--;if(myStatMonth<0){myStatMonth=11;myStatYear--;}render()">◀</div>
      <div class="month-nav-title">${myStatYear}년 ${myStatMonth+1}월</div>
      <div class="month-nav-btn" onclick="myStatMonth++;if(myStatMonth>11){myStatMonth=0;myStatYear++;}render()">▶</div>
    </div>`;
  } else {
    filtered=dailyRecords.filter(r=>r.data?.[w.id]);
    title='전체';
  }
  if(!filtered.length) return pBar+navHtml+`<div class="empty" style="padding:40px 0">해당 기간에 기록이 없어요</div>`;
  let tQty=0,tQtyA=0,tQtyB=0,tQtyC=0,tGross=0,tNet=0;
  filtered.forEach(r=>{
    const p=calcPay(w,r.data[w.id].qtyA,r.data[w.id].qtyB,r.data[w.id].qtyC);
    tQty+=p.qty; tQtyA+=p.a; tQtyB+=p.b; tQtyC+=p.c; tGross+=p.gross; tNet+=p.net;
  });
  const avgQty=filtered.length?Math.round(tQty/filtered.length):0;
  return pBar+navHtml+`
  <div class="stat-summary worker-stat">
    <div class="stat-title worker">📊 ${title} 내 통계</div>
    <div class="stat-row"><span class="stat-row-lbl">📅 배송일수</span><span class="stat-row-val">${filtered.length}일</span></div>
    <div class="stat-row"><span class="stat-row-lbl">🅰 ${itemNames.a}</span><span class="stat-row-val">${tQtyA.toLocaleString()}건</span></div>
    <div class="stat-row"><span class="stat-row-lbl">🅱 ${itemNames.b}</span><span class="stat-row-val">${tQtyB.toLocaleString()}건</span></div>
    <div class="stat-row"><span class="stat-row-lbl">🅲 ${itemNames.c}</span><span class="stat-row-val">${tQtyC.toLocaleString()}건</span></div>
    <div class="stat-row"><span class="stat-row-lbl">📦 총 배송</span><span class="stat-row-val">${tQty.toLocaleString()}건</span></div>
    <div class="stat-row"><span class="stat-row-lbl">📈 일평균</span><span class="stat-row-val">${avgQty.toLocaleString()}건</span></div>
    <hr class="stat-sep">
    <div class="stat-title worker" style="margin-bottom:6px">💰 예상 수령액</div>
    <div class="stat-total" style="color:var(--teal2)">${won(tGross)}</div>
    <div style="font-size:13px;font-weight:900;color:var(--green2);margin-top:4px">실수령 (3.3% 공제): ${won(tNet)}</div>
    <div style="font-size:10px;color:var(--red);margin-top:3px">세금 공제액: -${won(tGross-tNet)}</div>
  </div>
  <div class="sec-title">일별 내역 (${filtered.length}일)</div>
  ${filtered.map(r=>{ const p=calcPay(w,r.data[w.id].qtyA,r.data[w.id].qtyB,r.data[w.id].qtyC);
    return `<div class="detail-day-row">
      <div><div class="ddr-date">${fmtDate(r.date)} <span style="font-size:10px;color:var(--sub)">${fmtDay(r.date)}</span></div><div class="ddr-qty">🅰${p.a} · 🅱${p.b} · 🅲${p.c}</div></div>
      <div style="text-align:right"><div class="ddr-pay" style="color:var(--teal2)">${won(p.gross)}</div><div class="ddr-net">실수령 ${won(p.net)}</div></div>
    </div>`;
  }).join('')}
  <div style="height:20px"></div>`;
}

async function saveDailyToDB(date, data){
  const {error:de}=await db.from('daily_records').delete().eq('work_date',date);
  if(de) throw de;
  const rows=Object.entries(data)
    .filter(([,d])=>(Number(d.qtyA)||0)>0||(Number(d.qtyB)||0)>0||(Number(d.qtyC)||0)>0)
    .map(([wid,d])=>({
      work_date:date, worker_id:Number(wid),
      qty_a:Number(d.qtyA)||0, qty_b:Number(d.qtyB)||0, qty_c:Number(d.qtyC)||0
    }));
  if(rows.length>0){
    const {error:ie}=await db.from('daily_records').insert(rows);
    if(ie) throw ie;
  }
}

function openConfirm(title,msg,btnLabel,action,isDanger=true){
  document.getElementById('dlg-title').textContent=title;
  document.getElementById('dlg-msg').textContent=msg;
  const okBtn = document.getElementById('dlg-ok');
  okBtn.textContent=btnLabel;
  okBtn.style.background = isDanger ? 'var(--red)' : 'var(--teal)';
  confirmAction=action;
  document.getElementById('confirm-overlay').classList.add('show');
}
function closeConfirm(){ document.getElementById('confirm-overlay').classList.remove('show'); confirmAction=null; }
function doConfirm(){ if(confirmAction) confirmAction(); closeConfirm(); }

function openBackup(){
  document.getElementById('backup-sub').textContent=`배달원 ${workers.length}명 · 기록 ${dailyRecords.length}일 (서버 저장)`;
  document.getElementById('backup-sheet').classList.add('show');
}
function exportData(){
  const blob=new Blob([JSON.stringify({version:'mgr-v5',exportDate:new Date().toISOString(),workers,dailyRecords},null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=`배송관리_백업_${today()}.json`; a.click();
  URL.revokeObjectURL(url);
  document.getElementById('backup-sheet').classList.remove('show');
  showToast('📤 백업 완료!');
}
async function importData(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=async function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      showToast('📥 복원 중...');
      const existIds=new Set(workers.map(x=>x.id));
      for(const w of (data.workers||[])){
        if(!existIds.has(w.id)){
          const {data:d,error}=await db.from('workers').insert({
            name:w.name, price_a:w.priceA, price_b:w.priceB, price_c:w.priceC||0,
            region:w.region||'', access_codes:w.codes||[]
          }).select().single();
          if(!error) workers.push({id:d.id,name:w.name,region:w.region,priceA:w.priceA,priceB:w.priceB,priceC:w.priceC||0,loginId:'',codes:w.codes||[]});
        }
      }
      const existDates=new Set(dailyRecords.map(x=>x.date));
      let n=0;
      for(const r of (data.dailyRecords||[])){
        if(!existDates.has(r.date)){ await saveDailyToDB(r.date,r.data); dailyRecords.unshift({date:r.date,data:r.data}); n++; }
      }
      dailyRecords.sort((a,b)=>b.date.localeCompare(a.date));
      document.getElementById('backup-sheet').classList.remove('show');
      updateSummary(); render();
      showToast(`✅ 복원 완료! ${n}일`);
    }catch(err){ showToast('❌ 복원 실패: '+err.message); }
  };
  reader.readAsText(file); e.target.value='';
}
function exportCSV(){
  if(!dailyRecords.length||!workers.length){ showToast('⚠️ 내보낼 기록이 없어요'); return; }
  const months={};
  dailyRecords.forEach(r=>{
    const ym=r.date.slice(0,7);
    if(!months[ym]) months[ym]={};
    Object.entries(r.data||{}).forEach(([wid,d])=>{
      const w=workers.find(x=>x.id===Number(wid)); if(!w) return;
      const p=calcPay(w,d.qtyA,d.qtyB,d.qtyC);
      if(!months[ym][w.id]) months[ym][w.id]={name:w.name,qtyA:0,qtyB:0,qtyC:0,gross:0,net:0,days:0};
      months[ym][w.id].qtyA+=p.a; months[ym][w.id].qtyB+=p.b; months[ym][w.id].qtyC+=p.c;
      months[ym][w.id].gross+=p.gross; months[ym][w.id].net+=p.net; months[ym][w.id].days++;
    });
  });
  const rows=[`월,이름,${itemNames.a},${itemNames.b},${itemNames.c},총건수,총금액,실수령,세금공제,배송일수`];
  Object.keys(months).sort().forEach(ym=>{
    Object.values(months[ym]).forEach(t=>{
      rows.push(`${ym},${t.name},${t.qtyA},${t.qtyB},${t.qtyC},${t.qtyA+t.qtyB+t.qtyC},${t.gross},${t.net},${t.gross-t.net},${t.days}`);
    });
  });
  const blob=new Blob(['\uFEFF'+rows.join('\n')],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=`배송정산_${today()}.csv`; a.click();
  URL.revokeObjectURL(url);
  document.getElementById('backup-sheet').classList.remove('show');
  showToast('📊 CSV 내보내기 완료!');
}
function askReset(){
  document.getElementById('backup-sheet').classList.remove('show');
  openConfirm('⚠️ 전체 초기화',`배달원 ${workers.length}명 · 기록 ${dailyRecords.length}일\n서버에서 모두 삭제됩니다.`,'초기화',async()=>{
    try{
      await db.from('daily_records').delete().neq('id',0);
      await db.from('workers').delete().neq('id',0);
      workers=[]; dailyRecords=[];
      updateSummary(); render(); showToast('🗑 초기화 완료');
    }catch(e){ showToast('❌ '+e.message); }
  });
}
function copyCode(){
  const openEls=document.querySelectorAll('.bsoverlay.show');
  openEls.forEach(el=>el.classList.remove('show'));
  const code=document.documentElement.outerHTML;
  openEls.forEach(el=>el.classList.add('show'));
  navigator.clipboard.writeText(code).then(()=>{
    document.getElementById('backup-sheet').classList.remove('show');
    showToast('📋 전체 코드 복사 완료!');
  }).catch(()=>{
    const ta=document.createElement('textarea'); ta.value=code; ta.style.cssText='position:fixed;opacity:0';
    document.body.appendChild(ta); ta.select();
    try{ document.execCommand('copy'); showToast('📋 전체 코드 복사 완료!'); }
    catch(e){ showToast('❌ 복사 실패'); }
    document.body.removeChild(ta);
    document.getElementById('backup-sheet').classList.remove('show');
  });
}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

function initSortableCodes() {
  if (typeof Sortable === 'undefined') return;

  const dragOptions = {
    handle: '.code-drag-handle',
    animation: 150,
    delay: 200,             
    delayOnTouchOnly: true, 
    onEnd: updateCodeOrderFromDOM
  };

  const folderList = document.getElementById('cn-folder-list');
  if (folderList) {
    new Sortable(folderList, { ...dragOptions });
  }

  document.querySelectorAll('.cn-complexes').forEach(list => {
    new Sortable(list, { group: 'subs', ...dragOptions });
  });

  document.querySelectorAll('.cn-items').forEach(list => {
    new Sortable(list, { group: 'items', ...dragOptions });
  });
}

function updateCodeOrderFromDOM() {
  const wid = getActiveCodeWorkerId();
  const w = getCodeWorker(wid);
  if (!w) return;

  const allFolders = w.codes || [];
  const allSubs = [];
  const allItems = [];
  allFolders.forEach(f => {
    (f.subs || []).forEach(s => {
      allSubs.push(s);
      (s.items || []).forEach(i => allItems.push(i));
    });
  });

  const newCodes = [];
  const folderEls = document.querySelectorAll('#cn-folder-list > .cn-region');
  
  folderEls.forEach(fEl => {
    const fId = fEl.getAttribute('data-id');
    const oldFolder = allFolders.find(x => x.id === fId);
    if (oldFolder) {
      const newFolder = { ...oldFolder, subs: [] };
      const subEls = fEl.querySelectorAll('.cn-complexes > .cn-complex');
      
      subEls.forEach(sEl => {
        const sId = sEl.getAttribute('data-id');
        const oldSub = allSubs.find(x => x.id === sId);
        if (oldSub) {
          const newSub = { ...oldSub, items: [] };
          const itemEls = sEl.querySelectorAll('.cn-items > .cn-item');
          
          itemEls.forEach(iEl => {
            const iId = iEl.getAttribute('data-id');
            const itemObj = allItems.find(x => x.id === iId);
            if (itemObj) newSub.items.push(itemObj);
          });
          newFolder.subs.push(newSub);
        }
      });
      newCodes.push(newFolder);
    }
  });

  syncCodesToDB(wid, newCodes);
}

const savedUser=sessionStorage.getItem('mgr-user');
if(savedUser){
  try{
    currentUser=JSON.parse(savedUser);
    document.getElementById('login-wrap').classList.add('hide');
    document.getElementById('app').style.display='flex';
    setupUI();
    loadAll();
  }catch(e){ sessionStorage.removeItem('mgr-user'); }
} else {
  setTimeout(()=>document.getElementById('l-id').focus(),300);
}
