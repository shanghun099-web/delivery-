<html lang="ko"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<title>📊 배송 관리자</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&amp;display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d0f1a;--card:#131625;--card2:#0f1120;--border:#1e2240;
  --text:#e8eaf6;--sub:#5c6080;--sub2:#3a3f60;
  --accent:#6c63ff;--accent2:#8b83ff;--accent3:#b8b5ff;
  --green:#00d4aa;--green2:#00f5c4;
  --orange:#ff7043;--orange2:#ff9a6c;
  --red:#ff4757;--yellow:#ffd32a;--blue:#2979ff;--blue2:#64b5f6;
  --teal:#00bcd4;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;overflow:hidden}
#app{display:flex;flex-direction:column;height:100vh;height:-webkit-fill-available}
.header{background:linear-gradient(135deg,#1a1a3e 0%,#0d0f2a 100%);padding:48px 18px 14px;flex-shrink:0;position:relative;overflow:hidden;border-bottom:1px solid var(--border)}
.header::before{content:'';position:absolute;top:-40px;right:-30px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(108,99,255,0.15) 0%,transparent 70%)}
.header-row{display:flex;align-items:flex-end;justify-content:space-between;position:relative;z-index:1}
.header-label{font-size:10px;color:var(--accent3);letter-spacing:3px;margin-bottom:3px;font-weight:500}
.header-title{font-size:22px;font-weight:900;color:#fff}
.header-date{font-size:10px;color:var(--sub);margin-top:2px}
.header-actions{display:flex;gap:8px}
.hbtn{background:rgba(108,99,255,0.15);border:1.5px solid rgba(108,99,255,0.3);border-radius:12px;width:42px;height:42px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:all 0.15s}
.hbtn:active{background:rgba(108,99,255,0.3);transform:scale(0.91)}
.summary-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;padding:10px 14px;flex-shrink:0;background:var(--card2);border-bottom:1px solid var(--border)}
.sum-item{text-align:center;padding:8px 4px;background:var(--card);border-radius:10px;border-top:2px solid var(--accent)}
.sum-item:nth-child(2){border-top-color:var(--green)}
.sum-item:nth-child(3){border-top-color:var(--orange)}
.sum-val{font-size:14px;font-weight:900;color:var(--accent3);line-height:1.2}
.sum-item:nth-child(2) .sum-val{color:var(--green2)}
.sum-item:nth-child(3) .sum-val{color:var(--orange2)}
.sum-lbl{font-size:9px;color:var(--sub);margin-top:3px}
.tabs{display:flex;padding:10px 14px 0;gap:6px;flex-shrink:0;background:var(--card2)}
.tab{flex:1;padding:10px 0;border:none;font-size:11px;font-weight:700;cursor:pointer;transition:all 0.2s;font-family:inherit;border-radius:10px 10px 0 0;border-bottom:2px solid transparent}
.tab.active{background:var(--card);color:var(--accent2);border-bottom-color:var(--accent)}
.tab:not(.active){background:transparent;color:var(--sub)}
.content{flex:1;overflow-y:auto;padding:14px;-webkit-overflow-scrolling:touch;background:var(--card)}
.field{margin-bottom:12px}
.field label{display:block;font-size:10px;color:var(--sub);font-weight:700;letter-spacing:0.5px;margin-bottom:5px}
.field input,.field select,.field textarea{width:100%;background:var(--card2);border:1.5px solid var(--border);border-radius:10px;padding:11px 13px;font-size:15px;color:var(--text);outline:none;font-family:inherit;-webkit-appearance:none;transition:border 0.2s}
.field input:focus,.field select:focus{border-color:var(--accent)}
.btn-primary{width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:900;cursor:pointer;font-family:inherit;background:linear-gradient(135deg,var(--accent),#8b83ff);color:#fff;box-shadow:0 4px 20px rgba(108,99,255,0.3);transition:transform 0.1s;margin-bottom:10px}
.btn-primary:active{transform:scale(0.97)}
.btn-secondary{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:12px;font-size:13px;color:var(--sub);background:transparent;cursor:pointer;font-family:inherit;margin-bottom:8px}
.btn-green{background:linear-gradient(135deg,#00a882,#00d4aa);color:#001a14;box-shadow:0 4px 20px rgba(0,212,170,0.3)}
.worker-card{background:var(--card2);border-radius:14px;padding:14px;margin-bottom:10px;border-left:4px solid var(--accent);display:flex;align-items:center;gap:12px}
.worker-avatar{width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,var(--accent),#8b83ff);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:#fff;flex-shrink:0}
.worker-info{flex:1;min-width:0}
.worker-name{font-size:15px;font-weight:900}
.worker-prices{font-size:11px;color:var(--sub);margin-top:3px}
.worker-btns{display:flex;gap:6px;flex-shrink:0}
.wbtn{padding:7px 10px;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.wbtn-edit{background:rgba(108,99,255,0.15);color:var(--accent2)}
.wbtn-del{background:rgba(255,71,87,0.12);color:var(--red)}
.date-nav{display:flex;align-items:center;justify-content:space-between;background:var(--card2);border-radius:12px;padding:10px 14px;margin-bottom:14px;border:1.5px solid var(--border)}
.date-nav-btn{background:transparent;border:none;color:var(--sub);font-size:20px;cursor:pointer;padding:2px 8px;line-height:1}
.date-nav-label{font-size:14px;font-weight:900;color:var(--text)}
.date-nav-sub{font-size:10px;color:var(--sub);text-align:center;margin-top:2px}
.daily-worker-row{background:var(--card2);border-radius:14px;padding:13px 14px;margin-bottom:8px;border:1.5px solid var(--border);transition:border-color 0.2s}
.daily-worker-row.has-data{border-color:rgba(108,99,255,0.4)}
.daily-row-top{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.daily-avatar{width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,var(--accent),#8b83ff);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;color:#fff;flex-shrink:0}
.daily-name{font-size:14px;font-weight:700;flex:1}
.daily-total-badge{font-size:12px;font-weight:900;color:var(--green2);background:rgba(0,212,170,0.1);padding:3px 9px;border-radius:20px}
.daily-inputs{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.daily-field label{display:block;font-size:10px;color:var(--sub);font-weight:700;margin-bottom:4px}
.daily-field input{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:9px;padding:10px 8px;font-size:22px;font-weight:900;color:var(--text);text-align:center;outline:none;font-family:inherit;-webkit-appearance:none;transition:border 0.2s}
.daily-field input:focus{border-color:var(--accent);background:var(--card2)}
.daily-field-sub{font-size:10px;color:var(--sub);text-align:center;margin-top:4px;min-height:14px}
.rec-day-card{background:var(--card2);border-radius:14px;padding:14px;margin-bottom:10px;border:1.5px solid var(--border)}
.rec-day-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.rec-day-date{font-size:15px;font-weight:900}
.rec-day-total{font-size:13px;font-weight:900;color:var(--green2)}
.rec-day-workers{display:flex;flex-direction:column;gap:6px}
.rec-worker-row{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg);border-radius:9px}
.rec-worker-name{font-size:12px;font-weight:700;flex:1}
.rec-worker-qty{font-size:11px;color:var(--sub);margin-right:6px}
.rec-worker-pay{font-size:13px;font-weight:900;color:var(--accent3)}
.rec-day-btns{display:flex;gap:6px;margin-top:10px}
.rec-btn{flex:1;padding:8px;border:none;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit}
.rec-btn-edit{background:rgba(108,99,255,0.15);color:var(--accent2)}
.rec-btn-del{background:rgba(255,71,87,0.12);color:var(--red)}
.period-tabs{display:flex;gap:6px;margin-bottom:12px}
.period-tab{flex:1;padding:9px 0;border:1.5px solid var(--border);border-radius:10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;background:transparent;color:var(--sub);transition:all 0.2s}
.period-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.month-nav-btn{background:var(--card2);border:1.5px solid var(--border);border-radius:10px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;color:var(--sub)}
.month-nav-title{font-size:16px;font-weight:900}
.stat-summary{background:linear-gradient(135deg,#131625,#0f1120);border:1.5px solid rgba(108,99,255,0.25);border-radius:14px;padding:16px;margin-bottom:12px}
.stat-summary-title{font-size:10px;color:var(--accent3);letter-spacing:0.5px;margin-bottom:12px;font-weight:700}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:12px}
.stat-row-lbl{color:var(--sub)}
.stat-row-val{font-weight:700}
.stat-sep{border:none;border-top:1px solid var(--border);margin:8px 0}
.stat-total{font-size:22px;font-weight:900;color:var(--green2);margin-top:4px}
.worker-stat-card{background:var(--card2);border-radius:14px;padding:13px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px}
.wsc-rank{font-size:22px;font-weight:900;color:var(--sub2);width:28px;text-align:center;flex-shrink:0}
.wsc-avatar{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#8b83ff);display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;color:#fff;flex-shrink:0}
.wsc-info{flex:1;min-width:0}
.wsc-name{font-size:14px;font-weight:900}
.wsc-detail{font-size:10px;color:var(--sub);margin-top:2px}
.wsc-pay{text-align:right}
.wsc-gross{font-size:15px;font-weight:900;color:var(--accent3)}
.wsc-net{font-size:11px;color:var(--green2);margin-top:2px}
.wsc-qty{font-size:10px;color:var(--sub);margin-top:1px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:center;justify-content:center}
.overlay.show{display:flex}
.dialog{background:var(--card);border-radius:18px;padding:24px;width:290px;text-align:center;border:1px solid var(--border)}
.dialog h3{font-size:16px;margin-bottom:8px}
.dialog p{font-size:13px;color:var(--sub);margin-bottom:20px;line-height:1.5}
.dialog-btns{display:flex;gap:10px}
.dialog-btns button{flex:1;padding:13px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.dbtn-cancel{background:var(--card2);color:var(--sub)}
.dbtn-confirm{background:var(--red);color:#fff}
.bottom-sheet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:200;align-items:flex-end;justify-content:center}
.bottom-sheet-overlay.show{display:flex}
.bottom-sheet{background:var(--card);border-radius:22px 22px 0 0;padding:22px 18px 36px;width:100%;max-width:500px;border-top:1px solid var(--border)}
.sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 18px}
.sheet-title{font-size:15px;font-weight:900;margin-bottom:4px}
.sheet-sub{font-size:11px;color:var(--sub);margin-bottom:18px}
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--accent);color:var(--accent3);padding:11px 22px;border-radius:28px;font-size:13px;font-weight:700;z-index:999;pointer-events:none;opacity:0;transition:opacity 0.3s;white-space:nowrap}
.toast.show{opacity:1}
.bk-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.bk-btn{padding:14px 10px;border:none;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;text-align:center;line-height:1.6}
.bk-btn:active{transform:scale(0.96)}
.bk-export{background:linear-gradient(135deg,#1a3a5c,#1e4a7a);color:#7bbfff;border:1.5px solid #2a5a9a}
.bk-import{background:linear-gradient(135deg,#1a3a1a,#1e4a1e);color:#7fd67f;border:1.5px solid #2a6a2a}
.bk-reset{width:100%;padding:13px;background:rgba(255,71,87,0.12);color:var(--red);border:1.5px solid rgba(255,71,87,0.3);border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:10px}
.bk-close{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:12px;font-size:13px;color:var(--sub);background:transparent;cursor:pointer;font-family:inherit}
.bk-info{font-size:10px;color:var(--sub2);text-align:center;margin-bottom:12px}
.bk-csv{width:100%;padding:13px;background:rgba(0,212,170,0.1);color:var(--green2);border:1.5px solid rgba(0,212,170,0.3);border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:10px}
.input-subtabs{display:flex;gap:6px;margin-bottom:12px}
.input-subtab{flex:1;padding:9px 0;border:1.5px solid var(--border);border-radius:10px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;background:transparent;color:var(--sub);transition:all 0.2s}
.input-subtab.active{background:var(--accent);border-color:var(--accent);color:#fff}
.worker-select-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;-webkit-overflow-scrolling:touch}
.worker-select-chip{flex-shrink:0;padding:8px 14px;border:1.5px solid var(--border);border-radius:20px;font-size:12px;font-weight:700;cursor:pointer;background:transparent;color:var(--sub);font-family:inherit;white-space:nowrap}
.worker-select-chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
.worker-date-row{background:var(--card2);border-radius:12px;padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;border:1.5px solid var(--border)}
.worker-date-row.has-data{border-color:rgba(108,99,255,0.4)}
.wdr-date{font-size:13px;font-weight:700;flex:1}
.wdr-inputs{display:flex;gap:8px;align-items:center}
.wdr-input-wrap{text-align:center}
.wdr-input-wrap label{display:block;font-size:9px;color:var(--sub);font-weight:700;margin-bottom:3px}
.wdr-input-wrap input{width:72px;background:var(--bg);border:1.5px solid var(--border);border-radius:8px;padding:8px 6px;font-size:18px;font-weight:900;color:var(--text);text-align:center;outline:none;font-family:inherit;-webkit-appearance:none}
.wdr-input-wrap input:focus{border-color:var(--accent)}
.wdr-total{font-size:12px;font-weight:900;color:var(--green2);min-width:70px;text-align:right}
.back-btn{display:flex;align-items:center;gap:6px;background:var(--card2);border:1.5px solid var(--border);border-radius:10px;padding:9px 14px;font-size:13px;font-weight:700;color:var(--sub);cursor:pointer;margin-bottom:14px;font-family:inherit;width:fit-content}
.detail-worker-header{background:linear-gradient(135deg,rgba(108,99,255,0.15),rgba(108,99,255,0.05));border:1.5px solid rgba(108,99,255,0.2);border-radius:14px;padding:16px;margin-bottom:12px}
.detail-day-row{background:var(--card2);border-radius:10px;padding:11px 13px;margin-bottom:6px;display:flex;align-items:center;gap:10px}
.ddr-date{font-size:12px;font-weight:700;flex:1}
.ddr-qty{font-size:11px;color:var(--sub)}
.ddr-pay{font-size:13px;font-weight:900;color:var(--accent3)}
.ddr-net{font-size:10px;color:var(--green2);text-align:right}
/* 로그인 화면 */
.login-screen{position:fixed;inset:0;background:var(--bg);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.login-screen.hide{display:none}
.login-logo{font-size:48px;margin-bottom:8px}
.login-title{font-size:24px;font-weight:900;color:#fff;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--sub);margin-bottom:24px;letter-spacing:1px}
.login-box{width:100%;max-width:340px;background:var(--card);border-radius:20px;padding:24px;border:1px solid var(--border)}
.login-field{margin-bottom:14px}
.login-field label{display:block;font-size:11px;color:var(--sub);font-weight:700;letter-spacing:0.5px;margin-bottom:6px}
.login-field input{width:100%;background:var(--card2);border:1.5px solid var(--border);border-radius:12px;padding:13px 16px;font-size:16px;color:var(--text);outline:none;font-family:inherit;-webkit-appearance:none;transition:border 0.2s}
.login-field input:focus{border-color:var(--accent)}
.btn-login{width:100%;padding:15px;border:none;border-radius:14px;font-size:16px;font-weight:900;cursor:pointer;font-family:inherit;background:linear-gradient(135deg,var(--accent),#8b83ff);color:#fff;box-shadow:0 4px 20px rgba(108,99,255,0.4);margin-top:8px;transition:transform 0.1s}
.btn-login:active{transform:scale(0.97)}
.login-error{font-size:12px;color:var(--red);text-align:center;margin-top:12px;min-height:18px;font-weight:700}
.bk-copy{width:100%;padding:13px;background:rgba(108,99,255,0.1);color:var(--accent3);border:1.5px solid rgba(108,99,255,0.3);border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:10px}
.logout-btn{background:rgba(255,71,87,0.1);border:1.5px solid rgba(255,71,87,0.2);color:var(--red);font-size:11px;padding:6px 10px;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:700}

/* 로딩 */
.loading{display:flex;align-items:center;justify-content:center;height:200px;flex-direction:column;gap:12px}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:12px;color:var(--sub)}
.empty{text-align:center;color:var(--sub2);padding:50px 0;font-size:13px;line-height:2.4}
.section-title{font-size:11px;color:var(--sub);font-weight:700;letter-spacing:0.5px;margin-bottom:10px}
</style>
</head>
<body>
<!-- 로그인 화면 -->
<div class="login-screen hide" id="login-screen">
  <div class="login-logo">📊</div>
  <div class="login-title">배송 관리자</div>
  <div class="login-sub">DELIVERY MANAGER</div>
  <div class="login-box">
    <div class="login-field">
      <label>아이디</label>
      <input type="text" id="login-id" placeholder="아이디 입력" autocomplete="username">
    </div>
    <div class="login-field">
      <label>비밀번호</label>
      <input type="password" id="login-pw" placeholder="비밀번호 입력" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn-login" onclick="doLogin()">🔐 로그인</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<div id="app">
  <div class="header">
    <div class="header-row">
      <div>
        <div class="header-label">📊 DELIVERY MANAGER</div>
        <div class="header-title">배송 관리자</div>
        <div class="header-date" id="todayDate">2026년 3월 23일 월요일</div>
      </div>
      <div class="header-actions">
        <button class="logout-btn" onclick="doLogout()">로그아웃</button>
        <div class="hbtn" onclick="openBackup()" title="백업">💾</div>
      </div>
    </div>
  </div>
  <div class="summary-bar">
    <div class="sum-item"><div class="sum-val" id="s-workers">0명</div><div class="sum-lbl">등록 배달원</div></div>
    <div class="sum-item"><div class="sum-val" id="s-month-total">0원</div><div class="sum-lbl">이번 달 총액</div></div>
    <div class="sum-item"><div class="sum-val" id="s-today">0건</div><div class="sum-lbl">오늘 총 배송</div></div>
  </div>
  <div class="tabs">
    <button class="tab active" id="tab-daily" onclick="switchTab('daily')">📋 일별입력</button>
    <button class="tab" id="tab-records" onclick="switchTab('records')">📁 기록</button>
    <button class="tab" id="tab-stats" onclick="switchTab('stats')">📊 월별정산</button>
    <button class="tab" id="tab-workers" onclick="switchTab('workers')">👥 배달원</button>
  </div>
  <div class="content" id="content"><div class="input-subtabs">

async function loadAll(){
  isLoading = true;

    const {data:w, error:we} = await db.from('workers').select('*').order('id');

    workers = (w||[]).map(x=>({id:x.id, name:x.name, priceA:x.price_a, priceB:x.price_b}));

    // 기록 로드
    const {data:r, error:re} = await db.from('daily_records').select('*').order('work_date',{ascending:false});

async function saveWorkerToDB(w){
  if(!w.id || w.isNew){
    const {data,error} = await db.from('workers').insert({name:w.name,price_a:w.priceA,price_b:w.priceB}).select().single();
    if(error) throw error;
    return data.id;
  } else {
    const {error} = await db.from('workers').update({name:w.name,price_a:w.priceA,price_b:w.priceB}).eq('id',w.id);
    if(error) throw error;
    return w.id;
  }
}

async function saveDailyToDB(date, data){
  // 해당 날짜 기존 기록 삭제
  const {error:de} = await db.from('daily_records').delete().eq('work_date',date);
  if(de) throw de;
  // 새 기록 삽입
  const rows = Object.entries(data)
    .filter(([,d])=>(Number(d.qtyA)||0)>0||(Number(d.qtyB)||0)>0)
    .map(([wid,d])=>({work_date:date, worker_id:Number(wid), qty_a:Number(d.qtyA)||0, qty_b:Number(d.qtyB)||0}));
  if(rows.length>0){
    const {error:ie} = await db.from('daily_records').insert(rows);
    if(ie) throw ie;
  }
}

async function saveWorkerModeRecord(){
  const w=workers.find(x=>x.id===selectedInputWorker); if(!w) return;
  showToast('💾 저장 중...');
  let saved=0;
  try {
    const inputs=document.querySelectorAll('[data-date][data-type="A"]');
    for(const el of inputs){
      const date=el.dataset.date;
      const qa=document.getElementById(`wdr-a-${date}`)?.value||'';
      const qb=document.getElementById(`wdr-b-${date}`)?.value||'';
      const idx=dailyRecords.findIndex(r=>r.date===date);
      if(qa||qb){
        // Supabase upsert
        const {error}=await db.from('daily_records').upsert({work_date:date,worker_id:w.id,qty_a:Number(qa)||0,qty_b:Number(qb)||0},{onConflict:'work_date,worker_id'});
        if(error) throw error;
        if(idx>=0){ dailyRecords[idx].data[w.id]={qtyA:qa,qtyB:qb}; }
        else { dailyRecords.unshift({date,data:{[w.id]:{qtyA:qa,qtyB:qb}}}); }
        saved++;
      } else if(idx>=0 && dailyRecords[idx].data[w.id]){
        await db.from('daily_records').delete().eq('work_date',date).eq('worker_id',w.id);
        delete dailyRecords[idx].data[w.id];
      }
    }
    dailyRecords=dailyRecords.filter(r=>Object.keys(r.data||{}).length>0);
    dailyRecords.sort((a,b)=>b.date.localeCompare(a.date));
    updateSummary();
    showToast(`✅ ${w.name} ${saved}일치 저장 완료!`);
    render();
  } catch(e){ showToast('❌ 저장 실패: '+e.message); }
}

function askDeleteRecord(date){
  openConfirm('🗑 기록 삭제',`${fmtDate(date)} 기록을 삭제할까요?`,'삭제',async()=>{
    try {
      await deleteRecordFromDB(date);
      dailyRecords=dailyRecords.filter(r=>r.date!==date);
      updateSummary(); render();
      showToast('🗑 삭제됨');
    } catch(e){ showToast('❌ 삭제 실패: '+e.message); }
  });
}

// ===== 기록 =====
function renderRecords(){
  if(!dailyRecords.length) return `<div class="empty">📁 아직 기록이 없어요<br><span style="font-size:12px">일별입력 탭에서 입력하세요</span></div>`;
  return dailyRecords.map(r=>{
    let totalGross=0, workerRows='';
    Object.entries(r.data||{}).forEach(([wid,d])=>{
      const w=workers.find(x=>x.id===Number(wid)); if(!w) return;
      const p=calcWorkerPay(w,d.qtyA,d.qtyB);
      totalGross+=p.gross;
      if(p.qty>0) workerRows+=`<div class="rec-worker-row">
        <div class="daily-avatar" style="width:28px;height:28px;border-radius:7px;font-size:12px">${avatar(w.name)}</div>
        <div class="rec-worker-name">${w.name}</div>
        <div class="rec-worker-qty">🅰${p.a} 🅱${p.b}</div>

      <div class="rec-day-head">
        <div><div class="rec-day-date">${fmtDate(r.date)} <span style="font-size:11px;color:var(--sub);font-weight:400">${fmtDay(r.date)}</span></div></div>
        <div class="rec-day-total">${won(totalGross)}</div>
      </div>

      <div class="rec-day-btns">
        <button class="rec-btn rec-btn-edit" onclick="editRecord('${r.date}')">✏️ 수정</button>
        <button class="rec-btn rec-btn-del" onclick="askDeleteRecord('${r.date}')">🗑 삭제</button>
      </div>
    </div>`;
  }).join('')+'<div style="height:20px"></div>';
}

function editRecord(date){ inputDate=date; inputData={}; switchTab('daily'); }

// ===== 월별 정산 =====
function renderStats(){
  const periodBar=`<div class="period-tabs">
    <button class="period-tab ${statPeriod==='month'?'active':''}" onclick="statPeriod='month';render()">🗓 월별</button>
    <button class="period-tab ${statPeriod==='all'?'active':''}" onclick="statPeriod='all';render()">📊 전체</button>
  </div>`;
  if(!dailyRecords.length||!workers.length) return periodBar+`<div class="empty">📊 기록이 쌓이면 정산이 보여요!</div>`;
  let filtered=[], navHtml='', title='';
  if(statPeriod==='month'){
    const ym=`${statYear}-${String(statMonth+1).padStart(2,'0')}`;
    filtered=dailyRecords.filter(r=>r.date.startsWith(ym));
    title=`${statYear}년 ${statMonth+1}월 정산`;
    navHtml=`<div class="month-nav">
      <div class="month-nav-btn" onclick="statMonth--;if(statMonth<0){statMonth=11;statYear--;}render()">◀</div>
      <div class="month-nav-title">${statYear}년 ${statMonth+1}월</div>
      <div class="month-nav-btn" onclick="statMonth++;if(statMonth>11){statMonth=0;statYear++;}render()">▶</div>
    </div>`;
  } else { filtered=dailyRecords; title='전체 정산'; }
  if(!filtered.length) return periodBar+navHtml+`<div class="empty" style="padding:40px 0">📭 해당 기간에 기록이 없어요</div>`;
  const workerTotals={};
  workers.forEach(w=>{ workerTotals[w.id]={w,qty:0,qtyA:0,qtyB:0,gross:0,net:0,days:0}; });
  let grandGross=0, grandNet=0, grandQty=0;
  filtered.forEach(r=>{
    Object.entries(r.data||{}).forEach(([wid,d])=>{
      const w=workers.find(x=>x.id===Number(wid));
      if(!w||!workerTotals[w.id]) return;
      const p=calcWorkerPay(w,d.qtyA,d.qtyB);
      if(p.qty>0){
        workerTotals[w.id].qty+=p.qty; workerTotals[w.id].qtyA+=p.a; workerTotals[w.id].qtyB+=p.b;
        workerTotals[w.id].gross+=p.gross; workerTotals[w.id].net+=p.net; workerTotals[w.id].days++;
        grandGross+=p.gross; grandNet+=p.net; grandQty+=p.qty;
      }
    });
  });
  const sorted=Object.values(workerTotals).filter(x=>x.gross>0).sort((a,b)=>b.gross-a.gross);
  return periodBar+navHtml+`
    <div class="stat-summary">
      <div class="stat-summary-title">💰 ${title} 요약</div>
      <div class="stat-row"><span class="stat-row-lbl">📦 총 배송량</span><span class="stat-row-val">${grandQty.toLocaleString()}건</span></div>
      <div class="stat-row"><span class="stat-row-lbl">📅 기록일수</span><span class="stat-row-val">${filtered.length}일</span></div>
      <div class="stat-row"><span class="stat-row-lbl">👥 활동 배달원</span><span class="stat-row-val">${sorted.length}명</span></div>
      <hr class="stat-sep">
      <div class="stat-row"><span class="stat-row-lbl" style="font-weight:700;color:var(--accent3)">💵 총 지급 금액</span></div>
      <div class="stat-total">${won(grandGross)}</div>
      <div style="font-size:13px;font-weight:900;color:var(--green2);margin-top:4px">실수령 합계: ${won(grandNet)}</div>
      <div style="font-size:10px;color:var(--red);margin-top:3px">세금(3.3%) 공제: -${won(grandGross-grandNet)}</div>
    </div>
    <div class="section-title">개인별 정산 내역 <span style="font-weight:400;color:var(--sub2)">(탭하면 상세 확인)</span></div>
    ${sorted.map((t,i)=>`<div class="worker-stat-card" style="cursor:pointer" onclick="detailWorkerId=${t.w.id};render()">
      <div class="wsc-rank">${i+1}</div>
      <div class="wsc-avatar">${avatar(t.w.name)}</div>
      <div class="wsc-info"><div class="wsc-name">${t.w.name}</div><div class="wsc-detail">🅰${t.qtyA.toLocaleString()} · 🅱${t.qtyB.toLocaleString()} · ${t.days}일</div></div>
      <div class="wsc-pay"><div class="wsc-gross">${won(t.gross)}</div><div class="wsc-net">실수령 ${won(t.net)}</div><div class="wsc-qty">${t.qty.toLocaleString()}건</div></div>
    </div>`).join('')}
    <div style="height:20px"></div>`;
}

function renderWorkerDetail(){
  const w=workers.find(x=>x.id===detailWorkerId); if(!w) return '';
  const ym=statPeriod==='month'?`${statYear}-${String(statMonth+1).padStart(2,'0')}`:null;
  const filtered=ym?dailyRecords.filter(r=>r.date.startsWith(ym)):dailyRecords;
  const days=filtered.filter(r=>r.data?.[w.id]);

        <div><div style="font-size:18px;font-weight:900">${w.name}</div><div style="font-size:11px;color:var(--sub);margin-top:3px">🅰 ${(w.priceA||0).toLocaleString()}원 · 🅱 ${(w.priceB||0).toLocaleString()}원</div></div>

        <div style="background:rgba(0,0,0,0.2);border-radius:10px;padding:10px 12px"><div style="font-size:9px;color:var(--sub)">실수령</div><div style="font-size:18px;font-weight:900;color:var(--green2)">${won(tN)}</div></div>
        <div style="background:rgba(0,0,0,0.2);border-radius:10px;padding:10px 12px"><div style="font-size:9px;color:var(--sub)">총 배송(A+B)</div><div style="font-size:16px;font-weight:900">${(tA+tB).toLocaleString()}건</div></div>
        <div style="background:rgba(0,0,0,0.2);border-radius:10px;padding:10px 12px"><div style="font-size:9px;color:var(--sub)">세금공제(3.3%)</div><div style="font-size:16px;font-weight:900;color:var(--red)">-${won(tG-tN)}</div></div>
      </div>
    </div>
    <div class="section-title">일별 상세 내역 (${days.length}일)</div>
    ${days.map(r=>{ const p=calcWorkerPay(w,r.data[w.id].qtyA,r.data[w.id].qtyB);
      return `<div class="detail-day-row">
        <div><div class="ddr-date">${fmtDate(r.date)} <span style="font-size:10px;color:var(--sub)">${fmtDay(r.date)}</span></div><div class="ddr-qty">🅰${p.a}건 · 🅱${p.b}건</div></div>
        <div style="text-align:right"><div class="ddr-pay">${won(p.gross)}</div><div class="ddr-net">실수령 ${won(p.net)}</div></div>
      </div>`;
    }).join('')}
    ${!days.length?`<div class="empty" style="padding:30px 0">해당 기간 기록 없음</div>`:''}
    <div style="height:20px"></div>`;
}

// ===== 배달원 관리 =====
function renderWorkers(){
  const addBtn=`<button class="btn-primary" onclick="openWorkerSheet(null)" style="margin-bottom:16px">+ 배달원 추가</button>`;
  if(!workers.length) return addBtn+`<div class="empty">👥 등록된 배달원이 없어요</div>`;
  return addBtn+workers.map(w=>`<div class="worker-card">
    <div class="worker-avatar">${avatar(w.name)}</div>
    <div class="worker-info"><div class="worker-name">${w.name}</div><div class="worker-prices">🅰 ${(w.priceA||0).toLocaleString()}원 · 🅱 ${(w.priceB||0).toLocaleString()}원</div></div>
    <div class="worker-btns">
      <button class="wbtn wbtn-edit" onclick="openWorkerSheet(${w.id})">✏️</button>
      <button class="wbtn wbtn-del" onclick="askDeleteWorker(${w.id})">🗑</button>
    </div>
  </div>`).join('')+'<div style="height:20px"></div>';

function openWorkerSheet(id){
  editWorkerId=id;
  document.getElementById('ws-title').textContent=id?'👤 배달원 수정':'👤 배달원 추가';
  const w=id?workers.find(x=>x.id===id):null;
  document.getElementById('ws-name').value=w?.name||'';
  document.getElementById('ws-pa').value=w?.priceA||'';
  document.getElementById('ws-pb').value=w?.priceB||'';
  document.getElementById('worker-sheet').classList.add('show');
  setTimeout(()=>document.getElementById('ws-name').focus(),300);
}
function closeWorkerSheet(){ document.getElementById('worker-sheet').classList.remove('show'); editWorkerId=null; }

async function saveWorker(){
  const name=document.getElementById('ws-name').value.trim();
  const pa=Number(document.getElementById('ws-pa').value)||0;
  const pb=Number(document.getElementById('ws-pb').value)||0;
  if(!name){ showToast('⚠️ 이름을 입력해주세요'); return; }
  try {
    if(editWorkerId){
      const {error}=await db.from('workers').update({name,price_a:pa,price_b:pb}).eq('id',editWorkerId);
      if(error) throw error;
      workers=workers.map(w=>w.id===editWorkerId?{...w,name,priceA:pa,priceB:pb}:w);
      showToast('✅ 수정 완료');
    } else {
      const {data,error}=await db.from('workers').insert({name,price_a:pa,price_b:pb}).select().single();
      if(error) throw error;
      workers.push({id:data.id,name,priceA:pa,priceB:pb});
      showToast('✅ 배달원 추가 완료');
    }
    closeWorkerSheet(); updateSummary(); render();
  } catch(e){ showToast('❌ 저장 실패: '+e.message); }
}

function askDeleteWorker(id){
  const w=workers.find(x=>x.id===id);
  openConfirm('🗑 배달원 삭제',`${w?.name}님을 삭제할까요?`,'삭제',async()=>{
    try {
      await deleteWorkerFromDB(id);
      workers=workers.filter(x=>x.id!==id);
      updateSummary(); render();
      showToast('🗑 삭제됨');
    } catch(e){ showToast('❌ 삭제 실패: '+e.message); }
  });
}

// ===== 백업 =====
function openBackup(){
  document.getElementById('backup-sub').textContent=`배달원 ${workers.length}명 · 기록 ${dailyRecords.length}일 (서버 저장)`;
  document.getElementById('backup-sheet').classList.add('show');
}
function exportData(){
  const data={version:'mgr-v2',exportDate:new Date().toISOString(),workers,dailyRecords};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`배송관리_백업_${today()}.json`; a.click();
  URL.revokeObjectURL(url);
  document.getElementById('backup-sheet').classList.remove('show');
  showToast('📤 백업 완료!');
}
async function importData(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=async function(ev){
    try {
      const data=JSON.parse(ev.target.result);
      showToast('📥 복원 중...');
      // 배달원 복원
      const existIds=new Set(workers.map(x=>x.id));
      for(const w of (data.workers||[])){
        if(!existIds.has(w.id)){
          const {data:d,error}=await db.from('workers').insert({name:w.name,price_a:w.priceA,price_b:w.priceB}).select().single();
          if(!error) workers.push({id:d.id,name:w.name,priceA:w.priceA,priceB:w.priceB});
        }
      }
      // 기록 복원
      const existDates=new Set(dailyRecords.map(x=>x.date));
      let restored=0;
      for(const r of (data.dailyRecords||[])){
        if(!existDates.has(r.date)){
          await saveDailyToDB(r.date, r.data);
          dailyRecords.unshift({date:r.date,data:r.data});
          restored++;
        }
      }
      dailyRecords.sort((a,b)=>b.date.localeCompare(a.date));
      document.getElementById('backup-sheet').classList.remove('show');
      updateSummary(); render();
      showToast(`✅ 복원 완료! 기록 ${restored}일`);
    } catch(err){ showToast('❌ 복원 실패: '+err.message); }
  };
  reader.readAsText(file);
  e.target.value='';
}
function exportCSV(){
  if(!dailyRecords.length||!workers.length){ showToast('⚠️ 내보낼 기록이 없어요'); return; }
  const months={};
  dailyRecords.forEach(r=>{
    const ym=r.date.slice(0,7);
    if(!months[ym]) months[ym]={};
    Object.entries(r.data||{}).forEach(([wid,d])=>{
      const w=workers.find(x=>x.id===Number(wid)); if(!w) return;
      const p=calcWorkerPay(w,d.qtyA,d.qtyB);
      if(!months[ym][w.id]) months[ym][w.id]={name:w.name,qtyA:0,qtyB:0,gross:0,net:0,days:0};
      months[ym][w.id].qtyA+=p.a; months[ym][w.id].qtyB+=p.b;
      months[ym][w.id].gross+=p.gross; months[ym][w.id].net+=p.net; months[ym][w.id].days++;
    });
  });
  const rows=['월,이름,물품A건수,물품B건수,총건수,총금액,실수령,세금공제,배송일수'];
  Object.keys(months).sort().forEach(ym=>{
    Object.values(months[ym]).forEach(t=>{
      rows.push(`${ym},${t.name},${t.qtyA},${t.qtyB},${t.qtyA+t.qtyB},${t.gross},${t.net},${t.gross-t.net},${t.days}`);
    });
  });
  const csv='\uFEFF'+rows.join('\n');
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`배송정산_${today()}.csv`; a.click();
  URL.revokeObjectURL(url);
  document.getElementById('backup-sheet').classList.remove('show');
  showToast('📊 CSV 내보내기 완료!');
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
